<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Quoter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E1A17;
    --text: #EAE0D0;
    --text-dim: rgba(234, 224, 208, 0.55);
    --text-faint: rgba(234, 224, 208, 0.3);
    --accent: #C07838;
    --accent-glow: #D8904A;
    --border: rgba(234, 224, 208, 0.15);
    --border-bright: rgba(234, 224, 208, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    padding: 22px 24px 24px;
    max-width: 620px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ─── CONTEXT LINE ─── */
  .context {
    font-size: 13px;
    line-height: 1.5;
    letter-spacing: 0.01em;
    color: var(--text);
    text-align: center;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ─── VIDEO STAGE ─── */
  .video-stage {
    position: relative;
    width: 100%;
    max-width: 520px;
    aspect-ratio: 16 / 9;
    margin: 0 auto;
    border: 1px solid var(--border);
    background: #000;
    overflow: hidden;
  }

  .video-stage iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    z-index: 1;
  }

  /* transparent shield: swallows every mouse event so YouTube never
     registers a hover or click. no hover = no title bar, no logo,
     no end-screen. always present. */
  .click-shield {
    position: absolute;
    inset: 0;
    z-index: 2;
    cursor: default;
  }

  /* opaque cover: hides YouTube's thumbnail / paused frame. shown
     when idle or finished. holds the big PLAY / REPLAY affordance. */
  .cover {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16120F;
  }
  .cover.hidden { display: none; }

  .big-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-bright);
    padding: 14px 26px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  .big-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .big-btn .tri {
    display: inline-block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 7px 0 7px 12px;
    border-color: transparent transparent transparent currentColor;
  }
  .big-btn.replay .tri {
    /* circular arrow-ish glyph swap handled in JS via textContent */
    border: none;
    width: auto; height: auto;
    font-size: 15px;
    line-height: 1;
  }

  .cover-msg {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-align: center;
    padding: 0 24px;
    line-height: 1.5;
  }

  /* ─── TRANSPORT ─── */
  .transport {
    display: flex;
    align-items: center;
    gap: 14px;
    max-width: 520px;
    width: 100%;
    margin: 0 auto;
  }

  .stop-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px 16px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.08s, color 0.08s;
  }
  .stop-btn:hover:not(:disabled) { border-color: var(--border-bright); }
  .stop-btn:disabled { opacity: 0.28; cursor: not-allowed; }

  /* non-interactive progress readout (NOT a scrubber) */
  .progress {
    flex: 1;
    height: 3px;
    background: var(--border);
    position: relative;
    overflow: hidden;
    pointer-events: none;
  }
  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--accent);
    transition: width 0.1s linear;
  }

  /* ─── VOLUME ─── */
  .volume {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .vol-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--text-dim);
    text-transform: uppercase;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    padding: 2px 0;
    transition: color 0.08s;
  }
  .vol-label:hover { color: var(--text); }
  .vol-label.muted { color: var(--accent); }

  input[type="range"].vol {
    -webkit-appearance: none;
    appearance: none;
    width: 84px;
    height: 3px;
    background: var(--border);
    cursor: pointer;
    outline: none;
  }
  input[type="range"].vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 6px;
    height: 16px;
    background: var(--accent);
    border: none;
    border-radius: 0;
    box-shadow: inset 0 0 0 1px var(--bg);
  }
  input[type="range"].vol::-moz-range-thumb {
    width: 6px;
    height: 16px;
    background: var(--accent);
    border: none;
    border-radius: 0;
    box-shadow: inset 0 0 0 1px var(--bg);
  }
  input[type="range"].vol::-moz-range-track {
    height: 3px;
    background: var(--border);
  }

  /* ─── INSTRUCTION ─── */
  .instruction {
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    text-align: center;
    max-width: 520px;
    margin: 0 auto;
  }

  .source {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    text-align: center;
  }

  @media (max-width: 560px) {
    body { padding: 16px; }
    input[type="range"].vol { width: 60px; }
    .stop-btn { padding: 9px 12px; }
  }
</style>
</head>
<body>

  <div class="context" id="context"></div>

  <div class="video-stage">
    <div id="player"></div>
    <div class="click-shield"></div>
    <div class="cover" id="cover">
      <button class="big-btn" id="coverBtn"><span class="tri"></span><span id="coverLabel">PLAY</span></button>
      <div class="cover-msg" id="coverMsg" style="display:none;"></div>
    </div>
  </div>

  <div class="transport">
    <button class="stop-btn" id="stopBtn" disabled>Stop</button>
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="volume">
      <button class="vol-label" id="muteBtn">Vol</button>
      <input type="range" class="vol" id="volSlider" min="0" max="100" value="100" aria-label="Volume">
    </div>
  </div>

  <div class="instruction" id="instruction"></div>
  <div class="source" id="sourceLine"></div>

<script>
  // ══════════════════════════════════════════════════════════════
  //  CONFIG — one quote per MOTE. Duplicate this file, change these.
  // ══════════════════════════════════════════════════════════════
  const QUOTE = {
    videoId: 'lzk-l8Gm0MY',   // test clip
    start: 32,                // quote content start (s) — full volume from here
    end: 64,                  // quote content end (s)   — 1:04
    fadeIn: 3,                // seconds of fade-in BEFORE start (0 = hard cut)
    fadeOut: 3,               // seconds of fade-out AFTER end   (0 = hard cut)
    context: 'Mark Korven plays the Apprehension Engine',
    instruction: '',          // empty = hidden (no in-widget instruction)
    source: ''                // optional — set to '' to hide
  };
  // ══════════════════════════════════════════════════════════════

  // the played window extends 3s either side to hold the fades
  const PLAY_START = Math.max(0, QUOTE.start - (QUOTE.fadeIn || 0));
  const PLAY_END   = QUOTE.end + (QUOTE.fadeOut || 0);

  // ─── DOM ───
  const $context   = document.getElementById('context');
  const $cover     = document.getElementById('cover');
  const $coverBtn  = document.getElementById('coverBtn');
  const $coverLabel= document.getElementById('coverLabel');
  const $coverTri  = $coverBtn.querySelector('.tri');
  const $coverMsg  = document.getElementById('coverMsg');
  const $stopBtn   = document.getElementById('stopBtn');
  const $progress  = document.getElementById('progressFill');
  const $muteBtn   = document.getElementById('muteBtn');
  const $vol       = document.getElementById('volSlider');
  const $instr     = document.getElementById('instruction');
  const $source    = document.getElementById('sourceLine');

  $context.textContent = QUOTE.context;
  if (QUOTE.instruction) { $instr.textContent = QUOTE.instruction; } else { $instr.style.display = 'none'; }
  if (QUOTE.source) { $source.textContent = QUOTE.source; } else { $source.style.display = 'none'; }

  // ─── STATE ───
  let player = null;
  let ready = false;
  let hasPlayed = false;
  let poll = null;
  let lastVol = 100;

  // ─── YOUTUBE API BOOTSTRAP ───
  (function () {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();

  // must be global for the API to find it
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: QUOTE.videoId,
      playerVars: {
        controls: 0,          // no YouTube control bar
        disablekb: 1,         // no YouTube keyboard shortcuts
        rel: 0,               // no unrelated related-video spray
        fs: 0,                // no fullscreen button
        iv_load_policy: 3,    // no annotations
        modestbranding: 1,    // reduced branding
        playsinline: 1,       // no forced fullscreen on iOS
        start: PLAY_START,
        end: PLAY_END,
        cc_load_policy: 0
      },
      events: {
        onReady: onReady,
        onStateChange: onStateChange,
        onError: onError
      }
    });
  }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  function onReady() {
    ready = true;
    player.setVolume(+$vol.value);
    // cue at the fade-in point so the covered frame isn't frame 0
    safe(() => player.cueVideoById({
      videoId: QUOTE.videoId,
      startSeconds: PLAY_START,
      endSeconds: PLAY_END
    }));
  }

  function onError() {
    ready = false;
    $coverBtn.style.display = 'none';
    $coverMsg.style.display = '';
    $coverMsg.textContent = 'This clip could not be loaded. The video may have embedding disabled.';
    $stopBtn.disabled = true;
  }

  function onStateChange(e) {
    if (e.data === YT.PlayerState.PLAYING) {
      startPoll();
    } else if (e.data === YT.PlayerState.ENDED) {
      finishClip();
    }
  }

  // ─── TRANSPORT LOGIC ───
  function playClip() {
    if (!ready) return;
    hasPlayed = true;
    hideCover();
    $stopBtn.disabled = false;
    safe(() => { player.setVolume(0); player.seekTo(PLAY_START, true); player.playVideo(); });
  }

  function stopClip() {
    stopPoll();
    safe(() => { player.pauseVideo(); player.seekTo(PLAY_START, true); });
    $progress.style.width = '0%';
    $stopBtn.disabled = true;
    showCover();
  }

  function finishClip() {
    stopPoll();
    safe(() => { player.pauseVideo(); player.seekTo(PLAY_START, true); });
    $progress.style.width = '0%';
    $stopBtn.disabled = true;
    showCover();
  }

  function startPoll() {
    stopPoll();
    poll = setInterval(() => {
      if (!ready) return;
      const t = safeGet(() => player.getCurrentTime(), PLAY_START);

      // volume envelope: ramp up across the fade-in region, hold at
      // full through the quote, ramp down across the fade-out region
      let factor = 1;
      if (QUOTE.fadeIn && t < QUOTE.start) {
        factor = (t - PLAY_START) / QUOTE.fadeIn;
      } else if (QUOTE.fadeOut && t > QUOTE.end) {
        factor = 1 - (t - QUOTE.end) / QUOTE.fadeOut;
      }
      factor = Math.max(0, Math.min(1, factor));
      const baseVol = +$vol.value || 0;
      safe(() => player.setVolume(Math.round(baseVol * factor)));

      // progress spans the whole played window, fade tails included
      const frac = (t - PLAY_START) / (PLAY_END - PLAY_START);
      $progress.style.width = Math.max(0, Math.min(1, frac)) * 100 + '%';

      if (t >= PLAY_END - 0.05) finishClip();
    }, 50);
  }
  function stopPoll() { if (poll) { clearInterval(poll); poll = null; } }

  function showCover() {
    $cover.classList.remove('hidden');
    $coverLabel.textContent = hasPlayed ? 'REPLAY' : 'PLAY';
    if (hasPlayed) {
      $coverBtn.classList.add('replay');
      $coverTri.textContent = '↻';
    }
  }
  function hideCover() { $cover.classList.add('hidden'); }

  // ─── VOLUME ───
  function applyVolume(v) {
    safe(() => player.setVolume(v));
    if (v === 0) { safe(() => player.mute()); $muteBtn.classList.add('muted'); $muteBtn.textContent = 'Muted'; }
    else { safe(() => player.unMute()); $muteBtn.classList.remove('muted'); $muteBtn.textContent = 'Vol'; }
  }

  $vol.addEventListener('input', () => { lastVol = +$vol.value || 0; applyVolume(+$vol.value); });
  $muteBtn.addEventListener('click', () => {
    if (+$vol.value === 0) { $vol.value = lastVol || 100; applyVolume(+$vol.value); }
    else { lastVol = +$vol.value; $vol.value = 0; applyVolume(0); }
  });

  // ─── WIRE ───
  $coverBtn.addEventListener('click', playClip);
  $stopBtn.addEventListener('click', stopClip);

  // ─── SAFE CALL WRAPPERS ───
  function safe(fn) { try { fn(); } catch (e) {} }
  function safeGet(fn, fallback) { try { return fn(); } catch (e) { return fallback; } }
</script>
</body>
</html>
