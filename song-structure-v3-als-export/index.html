<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Structure Analyser — Live Set Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E1A17;
    --text: #EAE0D0;
    --text-dim: rgba(234, 224, 208, 0.55);
    --text-faint: rgba(234, 224, 208, 0.3);
    --accent: #C07838;
    --accent-glow: #D8904A;
    --border: rgba(234, 224, 208, 0.15);
    --border-bright: rgba(234, 224, 208, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    padding: 20px 24px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }

  .title {
    font-size: 13px;
    letter-spacing: 0.2em;
    font-weight: 600;
  }

  .mode-tabs {
    display: flex;
    border: 1px solid var(--border);
  }

  .mode-tab {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.12em;
    cursor: pointer;
    text-transform: uppercase;
    border-right: 1px solid var(--border);
    transition: color 0.1s, background 0.1s;
  }
  .mode-tab:last-child { border-right: none; }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.active {
    background: var(--accent);
    color: var(--bg);
  }

  /* ─── SECTION BUTTONS ─── */
  .section-buttons-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .section-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .section-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-left-width: 4px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.12em;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 500;
    transition: background 0.08s, border-color 0.08s, transform 0.05s;
    min-width: 80px;
  }
  .section-btn:hover { border-color: var(--border-bright); }
  .section-btn:active { transform: translateY(1px); }
  .section-btn.flash {
    background: var(--accent);
    color: var(--bg);
  }

  /* ─── TIMELINE ─── */
  .timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .timeline-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .bar-count {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .bar-count strong {
    color: var(--accent);
    font-weight: 400;
  }

  .timeline {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    min-height: 64px;
    padding: 10px;
    border: 1px solid var(--border);
    margin-bottom: 6px;
    align-content: flex-start;
  }

  .timeline.empty {
    align-items: center;
    justify-content: center;
  }

  .timeline.empty::after {
    content: "Click a section button as each bar plays in the music.";
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 0.04em;
    font-style: italic;
  }

  .group {
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-size: 9px;
    letter-spacing: 0.1em;
    font-weight: 600;
    color: var(--bg);
    transition: filter 0.08s, outline-offset 0.08s;
    position: relative;
    user-select: none;
    padding: 0 6px;
    overflow: hidden;
    white-space: nowrap;
  }
  .group:hover { filter: brightness(1.15); }
  .group.selected {
    outline: 2px solid var(--text);
    outline-offset: -2px;
    z-index: 1;
  }

  .group-name {
    font-size: 9.5px;
    letter-spacing: 0.1em;
    line-height: 1.1;
  }
  .group-bars {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    opacity: 0.75;
    letter-spacing: 0.02em;
    margin-top: 2px;
    font-weight: 400;
  }

  .hint {
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    margin-bottom: 18px;
    font-style: italic;
  }

  /* ─── INFO PANEL ─── */
  .info-panel {
    border: 1px solid var(--border);
    padding: 16px 18px;
    margin-bottom: 18px;
    min-height: 100px;
  }

  .info-placeholder {
    font-size: 12px;
    color: var(--text-faint);
    font-style: italic;
    letter-spacing: 0.02em;
    text-align: center;
    padding: 22px 0;
  }

  .info-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .info-section-name {
    font-size: 12px;
    letter-spacing: 0.22em;
    font-weight: 600;
  }

  .info-view-toggle {
    display: flex;
    border: 1px solid var(--border);
  }
  .info-view-toggle button {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.14em;
    cursor: pointer;
    text-transform: uppercase;
    border-right: 1px solid var(--border);
    transition: color 0.1s, background 0.1s;
  }
  .info-view-toggle button:last-child { border-right: none; }
  .info-view-toggle button:hover { color: var(--text); }
  .info-view-toggle button.active {
    background: var(--accent);
    color: var(--bg);
  }

  .info-block {
    margin-bottom: 14px;
  }
  .info-block:last-child { margin-bottom: 0; }

  .info-block-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .info-block-body {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }

  .info-features-intro {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 6px;
  }

  .info-features {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .info-features li {
    font-size: 13px;
    line-height: 1.55;
    padding: 3px 0 3px 12px;
    color: var(--text);
    position: relative;
  }
  .info-features li::before {
    content: "—";
    position: absolute;
    left: 0;
    color: var(--text-dim);
  }
  .info-features strong {
    color: var(--accent);
    font-weight: 600;
  }

  .info-quote {
    border-left: 2px solid var(--accent);
    padding: 8px 12px;
    margin: 0 0 8px 0;
    background: rgba(192, 120, 56, 0.06);
  }
  .info-quote:last-child { margin-bottom: 0; }
  .quote-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    font-style: italic;
    margin-bottom: 4px;
  }
  .quote-attribution {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .info-examples {
    font-size: 12px;
    line-height: 1.8;
    color: var(--text);
  }
  .example-item {
    font-style: italic;
  }
  .example-year {
    color: var(--text-dim);
    font-style: normal;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    margin-left: 2px;
  }
  .example-sep {
    color: var(--text-faint);
    margin: 0 6px;
  }

  .info-note {
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }

  /* ─── ACTIONS ─── */
  .actions {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .action-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.12em;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.08s, background 0.08s;
  }
  .action-btn:hover:not(:disabled) { border-color: var(--border-bright); }
  .action-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .action-btn.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .action-btn.primary:hover:not(:disabled) { background: var(--accent-glow); border-color: var(--accent-glow); }
  .action-btn.danger:hover:not(:disabled) {
    border-color: #B85542;
    color: #B85542;
  }

  /* ─── SUMMARY ─── */
  .summary {
    border: 1px solid var(--accent);
    padding: 18px 20px;
    margin-top: 8px;
    display: none;
  }
  .summary.active { display: block; }

  .summary-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .summary-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    font-weight: 600;
  }

  .summary-mode {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .summary-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: var(--text);
  }
  .stat-value strong {
    color: var(--accent);
    font-weight: 400;
  }

  .summary-list {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.7;
    margin: 8px 0 16px;
    color: var(--text);
    white-space: pre-wrap;
  }

  .summary-observations {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-dim);
    margin-bottom: 14px;
    padding: 10px 12px;
    border-left: 2px solid var(--accent);
    background: rgba(192, 120, 56, 0.06);
  }
  .summary-observations strong {
    color: var(--text);
    font-weight: 500;
  }

  .summary-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .copy-btn, .export-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.12em;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    transition: background 0.1s;
  }
  .copy-btn:hover, .export-btn:hover { background: var(--accent-glow); }
  .copy-btn.copied, .export-btn.copied { background: #6F8A50; }
  .export-btn.failed { background: #B85542; }

  .export-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--accent);
  }
  .export-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  /* responsive */
  @media (max-width: 600px) {
    body { padding: 16px; }
    .section-btn { font-size: 9px; padding: 8px 10px; min-width: 0; }
    .action-btn { font-size: 9px; padding: 8px 10px; }
  }
</style>
</head>
<body>
  <div class="header">
    <div class="title">SONG STRUCTURE ANALYSER</div>
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="pop">Pop / Rock</button>
      <button class="mode-tab" data-mode="hiphop">Hip-Hop / Rap</button>
      <button class="mode-tab" data-mode="electronic">Electronic</button>
    </div>
  </div>

  <div class="section-buttons-label">Tap a section once per bar</div>
  <div class="section-buttons" id="sectionButtons"></div>

  <div class="timeline-header">
    <div class="timeline-label">Timeline</div>
    <div class="bar-count" id="barCount"><strong>0</strong> bars</div>
  </div>
  <div class="timeline empty" id="timeline"></div>
  <div class="hint">Click a block to select it, then click a section button to reassign.</div>

  <div class="info-panel" id="infoPanel"></div>

  <div class="actions">
    <button class="action-btn" id="undoBtn" disabled>Undo Last</button>
    <button class="action-btn" id="deleteBtn" disabled>Delete Selected</button>
    <button class="action-btn danger" id="clearBtn" disabled>Clear All</button>
    <button class="action-btn primary" id="endBtn" disabled>Finish</button>
  </div>

  <div class="summary" id="summary"></div>

<script>
  // ─── SECTION DATA ────────────────────────────────────────────────
  // Schema:
  //   content.simple    — required: short info shown by default
  //   content.detailed  — optional: full info shown when DETAILED toggled
  //   Each view has: function (string), features (optional list), quotes (optional list), examples (optional list)

  const SECTIONS = {
    pop: [
      {
        name: 'INTRO',
        color: '#8FA37E',
        content: {
          simple: {
            function: "The song's front door. Its job is to grab attention in the first few seconds and tell the listener what world the song lives in — key, tempo, mood, genre.",
            featuresIntro: "Usually 4, 8, or 16 bars. Three common shapes:",
            features: [
              { label: "Riff-led", desc: "a signature instrumental hook (Seven Nation Army)" },
              { label: "Chord vamp", desc: "a looping progression with no melody (Get Lucky)" },
              { label: "Sparse-to-full build", desc: "one element grows into the full band (Rolling in the Deep)" }
            ],
            quotes: [
              { text: "You had to get people's attention in the first ten seconds.", attribution: "George Martin, producer of The Beatles" }
            ],
            examples: [
              "A Hard Day's Night", "Sweet Child O' Mine", "Smells Like Teen Spirit",
              "Wonderwall", "Mr. Brightside", "Bad Guy", "Anti-Hero"
            ]
          },
          detailed: {
            function: "The intro is the song's front door. Producers from the 1960s radio era onward have treated the opening seconds as the most valuable real estate on a record — the streaming era hasn't relaxed that. Its job: grab attention fast, establish the key, tempo and mood, signal the genre and production aesthetic, and create anticipation for the moment the vocal enters. The best intros also work as the song's audio logo — a few notes that announce the entire track before a word is sung.",
            featuresIntro: "Most intros are 4, 8, or 16 bars. Four common shapes:",
            features: [
              { label: "Riff-led", desc: "a signature instrumental hook IS the song's identity (Seven Nation Army, Sweet Child O' Mine)" },
              { label: "Chord vamp", desc: "a looping progression without a melodic hook sets feel and key (Get Lucky)" },
              { label: "Sparse-to-full build", desc: "start with one element, layer up to the first verse (Rolling in the Deep, Anti-Hero)" },
              { label: "Cold open", desc: "no intro at all, vocal on bar one (Mr. Brightside, Help!)" }
            ],
            quotes: [
              { text: "You had to get people's attention in the first ten seconds.", attribution: "George Martin, producer of The Beatles" },
              { text: "It was me trying to write a song without a chorus and still get people's attention… 'I'm not gonna have a chorus in this song. See if I can get away with it.' And on that one, we really did get away with it.", attribution: "Jack White, on the Seven Nation Army riff" }
            ],
            examples: [
              { song: "A Hard Day's Night", year: 1964 },
              { song: "Whole Lotta Love", year: 1969 },
              { song: "Bohemian Rhapsody", year: 1975 },
              { song: "Sweet Child O' Mine", year: 1987 },
              { song: "Smells Like Teen Spirit", year: 1991 },
              { song: "Wonderwall", year: 1995 },
              { song: "Mr. Brightside", year: 2003 },
              { song: "Seven Nation Army", year: 2003 },
              { song: "Rolling in the Deep", year: 2010 },
              { song: "Get Lucky", year: 2013 },
              { song: "Bad Guy", year: 2019 },
              { song: "Anti-Hero", year: 2022 }
            ]
          }
        }
      },
      { name: 'VERSE',       color: '#C07838', content: { simple: { function: "Tells the story. Usually the same melody each time but with different lyrics. Lower energy than the chorus — sets up the payoff." } } },
      { name: 'PRE-CHORUS',  color: '#C8A04A', content: { simple: { function: "Builds tension before the chorus. Often climbs in pitch, harmony or energy to create lift into the hook." } } },
      { name: 'CHORUS',      color: '#B85542', content: { simple: { function: "The main hook. Catchiest melody, the song title often appears here. The most memorable part — the bit you hum after one listen." } } },
      { name: 'POST-CHORUS', color: '#B07878', content: { simple: { function: 'Extends the chorus energy. Often a wordless hook ("oh-oh-oh"), an instrumental tag, or a vocal chop.' } } },
      { name: 'BRIDGE',      color: '#8B6A8B', content: { simple: { function: "Provides contrast. New chords, new melody, often the emotional peak. Breaks the verse-chorus pattern so the final chorus hits harder." } } },
      { name: 'SOLO',        color: '#8A8540', content: { simple: { function: "Instrumental feature, usually guitar or keys, played over the verse or chorus chords. Shows off a player or a melodic idea." } } },
      { name: 'OUTRO',       color: '#8A7A6A', content: { simple: { function: "Brings the song to a close. Can fade out, repeat the chorus, return to the intro, or have a definitive ending." } } }
    ],
    hiphop: [
      { name: 'INTRO',    color: '#8FA37E', content: { simple: { function: "Sets the vibe with a beat, vocal sample, ad-lib or DJ tag. Often shorter than in pop — the beat takes centre stage quickly." } } },
      { name: 'VERSE',    color: '#C07838', content: { simple: { function: "Usually 16 bars of rapping (sometimes 8 or 32). Carries the lyrical content, storytelling and flow. Where the rapper does their actual work." } } },
      { name: 'PRE-HOOK', color: '#C8A04A', content: { simple: { function: "Short build into the hook. Not always present — many tracks go straight from verse to hook with no setup." } } },
      { name: 'HOOK',     color: '#B85542', content: { simple: { function: "The catchy refrain — the hip-hop equivalent of the chorus. Often sung rather than rapped. Repeats the song title or main phrase." } } },
      { name: 'BRIDGE',   color: '#8B6A8B', content: { simple: { function: "Less common in hip-hop but provides contrast. Often a beat switch, a feature artist, or a change of tempo." } } },
      { name: 'BREAK',    color: '#5C8A8A', content: { simple: { function: "Instrumental section, often just the beat. Lets the production breathe and reminds you the beat itself is doing serious work." } } },
      { name: 'OUTRO',    color: '#8A7A6A', content: { simple: { function: "Closes the track. May feature an ad-lib, DJ tag, beat fade, or one final hook." } } }
    ],
    electronic: [
      { name: 'INTRO',     color: '#8FA37E', content: { simple: { function: "Loops a sparse element or two to establish tempo. DJ-friendly so the next track can be beat-matched into it." } } },
      { name: 'BUILD',     color: '#C8A04A', content: { simple: { function: "Tension rises. Filter sweeps, snare rolls, risers, white noise, pitch-bent synths. Energy climbs toward the drop." } } },
      { name: 'DROP',      color: '#B85542', content: { simple: { function: "The release. Full energy, main hook, bassline drops in. The payoff after the build — the reason the build existed." } } },
      { name: 'GROOVE',    color: '#C07838', content: { simple: { function: "The steady main section of a house or techno track. Loops the core elements without dramatic peaks — the body of the track." } } },
      { name: 'BREAKDOWN', color: '#5C8A8A', content: { simple: { function: "Strips the energy back. Often removes drums, leaving melodic or atmospheric elements. Resets the listener for another build." } } },
      { name: 'FAKE DROP', color: '#8B6A8B', content: { simple: { function: "Pretends to drop but pulls back at the last moment. Plays with expectation — the second drop hits harder because of it." } } },
      { name: 'OUTRO',     color: '#8A7A6A', content: { simple: { function: "Mirrors the intro. Strips back the elements so a DJ can mix the next track in cleanly." } } }
    ]
  };

  const MODE_LABELS = {
    pop: 'Pop / Rock',
    hiphop: 'Hip-Hop / Rap',
    electronic: 'Electronic'
  };

  // ─── STATE ───────────────────────────────────────────────────────
  let state = {
    mode: 'pop',
    bars: [],
    selectedGroupIdx: null,
    finalized: false,
    lastInfoSection: null,
    infoView: 'simple',    // 'simple' | 'detailed'
  };

  // ─── DOM REFS ────────────────────────────────────────────────────
  const $modeTabs = document.getElementById('modeTabs');
  const $sectionButtons = document.getElementById('sectionButtons');
  const $timeline = document.getElementById('timeline');
  const $barCount = document.getElementById('barCount');
  const $infoPanel = document.getElementById('infoPanel');
  const $undoBtn = document.getElementById('undoBtn');
  const $deleteBtn = document.getElementById('deleteBtn');
  const $clearBtn = document.getElementById('clearBtn');
  const $endBtn = document.getElementById('endBtn');
  const $summary = document.getElementById('summary');

  // ─── HELPERS ─────────────────────────────────────────────────────
  function currentSections() {
    return SECTIONS[state.mode];
  }

  function sectionByName(name) {
    return currentSections().find(s => s.name === name) ||
           Object.values(SECTIONS).flat().find(s => s.name === name);
  }

  function groupedBars() {
    const groups = [];
    for (const name of state.bars) {
      const last = groups[groups.length - 1];
      if (last && last.name === name) {
        last.count++;
      } else {
        groups.push({ name, count: 1 });
      }
    }
    return groups;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ─── INFO PANEL RENDERING ───────────────────────────────────────
  function renderInfoPanel() {
    if (!state.lastInfoSection) {
      $infoPanel.innerHTML = '<div class="info-placeholder">Hover or click a section button to see what it does.</div>';
      return;
    }

    const section = sectionByName(state.lastInfoSection);
    if (!section || !section.content) {
      $infoPanel.innerHTML = '<div class="info-placeholder">No info available.</div>';
      return;
    }

    const hasDetailed = !!section.content.detailed;
    const view = state.infoView;
    const content = (view === 'detailed' && hasDetailed) ? section.content.detailed : section.content.simple;
    const showInProgressNote = view === 'detailed' && !hasDetailed;

    let html = '';

    // Header: section name + view toggle
    html += `<div class="info-header">
      <div class="info-section-name" style="color: ${section.color};">${escapeHtml(section.name)}</div>
      <div class="info-view-toggle" id="infoViewToggle">
        <button data-view="simple" class="${view === 'simple' ? 'active' : ''}">Simple</button>
        <button data-view="detailed" class="${view === 'detailed' ? 'active' : ''}">Detailed</button>
      </div>
    </div>`;

    // Function
    if (content.function) {
      html += `<div class="info-block">
        <div class="info-block-label">Function</div>
        <div class="info-block-body">${escapeHtml(content.function)}</div>
      </div>`;
    }

    // Features
    if (content.features && content.features.length) {
      html += `<div class="info-block">
        <div class="info-block-label">Features</div>`;
      if (content.featuresIntro) {
        html += `<div class="info-features-intro">${escapeHtml(content.featuresIntro)}</div>`;
      }
      html += `<ul class="info-features">`;
      content.features.forEach(f => {
        html += `<li><strong>${escapeHtml(f.label)}</strong> — ${escapeHtml(f.desc)}</li>`;
      });
      html += `</ul></div>`;
    }

    // Quotes
    if (content.quotes && content.quotes.length) {
      const label = content.quotes.length > 1 ? 'Quotes' : 'Quote';
      html += `<div class="info-block">
        <div class="info-block-label">${label}</div>`;
      content.quotes.forEach(q => {
        html += `<blockquote class="info-quote">
          <div class="quote-text">"${escapeHtml(q.text)}"</div>
          <div class="quote-attribution">— ${escapeHtml(q.attribution)}</div>
        </blockquote>`;
      });
      html += `</div>`;
    }

    // Examples
    if (content.examples && content.examples.length) {
      html += `<div class="info-block">
        <div class="info-block-label">Famous Examples</div>
        <div class="info-examples">`;
      const items = content.examples.map(e => {
        if (typeof e === 'string') {
          return `<span class="example-item">${escapeHtml(e)}</span>`;
        }
        return `<span class="example-item">${escapeHtml(e.song)}<span class="example-year">(${escapeHtml(e.year)})</span></span>`;
      });
      html += items.join('<span class="example-sep">·</span>');
      html += `</div></div>`;
    }

    if (showInProgressNote) {
      html += `<div class="info-note">Detailed view for this section is still being developed.</div>`;
    }

    $infoPanel.innerHTML = html;

    // Wire toggle
    const $toggle = document.getElementById('infoViewToggle');
    if ($toggle) {
      $toggle.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-view]');
        if (!btn) return;
        state.infoView = btn.dataset.view;
        renderInfoPanel();
      });
    }
  }

  // ─── OTHER RENDERING ─────────────────────────────────────────────
  function renderModeTabs() {
    $modeTabs.querySelectorAll('.mode-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.mode === state.mode);
    });
  }

  function renderSectionButtons() {
    $sectionButtons.innerHTML = '';
    currentSections().forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'section-btn';
      btn.textContent = s.name;
      btn.style.borderLeftColor = s.color;
      btn.addEventListener('click', () => handleSectionClick(s.name, btn));
      btn.addEventListener('mouseenter', () => showInfo(s.name));
      $sectionButtons.appendChild(btn);
    });
  }

  function renderTimeline() {
    const groups = groupedBars();
    $timeline.innerHTML = '';
    $timeline.classList.toggle('empty', groups.length === 0);

    groups.forEach((g, idx) => {
      const section = sectionByName(g.name);
      const el = document.createElement('div');
      el.className = 'group';
      if (idx === state.selectedGroupIdx) el.classList.add('selected');
      el.style.background = section ? section.color : '#888';
      const width = Math.max(48, g.count * 36);
      el.style.minWidth = width + 'px';
      el.style.flexGrow = g.count;

      const nameEl = document.createElement('div');
      nameEl.className = 'group-name';
      nameEl.textContent = g.name;
      el.appendChild(nameEl);

      const barsEl = document.createElement('div');
      barsEl.className = 'group-bars';
      barsEl.textContent = g.count + ' BAR' + (g.count > 1 ? 'S' : '');
      el.appendChild(barsEl);

      el.addEventListener('click', () => handleGroupClick(idx));
      $timeline.appendChild(el);
    });

    $barCount.innerHTML = '<strong>' + state.bars.length + '</strong> bars';
  }

  function renderActions() {
    $undoBtn.disabled = state.bars.length === 0 || state.finalized;
    $deleteBtn.disabled = state.selectedGroupIdx === null || state.finalized;
    $clearBtn.disabled = state.bars.length === 0;
    $endBtn.disabled = state.bars.length === 0 || state.finalized;
  }

  function showInfo(sectionName) {
    state.lastInfoSection = sectionName;
    renderInfoPanel();
  }

  function renderAll() {
    renderModeTabs();
    renderSectionButtons();
    renderTimeline();
    renderActions();
    renderInfoPanel();
  }

  // ─── EVENT HANDLERS ──────────────────────────────────────────────
  function handleModeChange(newMode) {
    if (newMode === state.mode) return;
    if (state.bars.length > 0) {
      if (!confirm('Switching mode will clear your current timeline. Continue?')) return;
    }
    state.mode = newMode;
    state.bars = [];
    state.selectedGroupIdx = null;
    state.finalized = false;
    state.lastInfoSection = null;
    $summary.classList.remove('active');
    renderAll();
  }

  function handleSectionClick(name, btnEl) {
    showInfo(name);
    if (btnEl) {
      btnEl.classList.add('flash');
      setTimeout(() => btnEl.classList.remove('flash'), 120);
    }
    if (state.finalized) return;

    if (state.selectedGroupIdx !== null) {
      const groups = groupedBars();
      const target = groups[state.selectedGroupIdx];
      if (target) {
        let startIdx = 0;
        for (let i = 0; i < state.selectedGroupIdx; i++) startIdx += groups[i].count;
        for (let i = 0; i < target.count; i++) state.bars[startIdx + i] = name;
      }
      state.selectedGroupIdx = null;
    } else {
      state.bars.push(name);
    }
    renderTimeline();
    renderActions();
  }

  function handleGroupClick(idx) {
    if (state.finalized) return;
    state.selectedGroupIdx = (state.selectedGroupIdx === idx) ? null : idx;
    const groups = groupedBars();
    if (state.selectedGroupIdx !== null && groups[idx]) {
      showInfo(groups[idx].name);
    }
    renderTimeline();
    renderActions();
  }

  function handleUndo() {
    if (state.bars.length === 0) return;
    state.bars.pop();
    state.selectedGroupIdx = null;
    renderTimeline();
    renderActions();
  }

  function handleDelete() {
    if (state.selectedGroupIdx === null) return;
    const groups = groupedBars();
    const target = groups[state.selectedGroupIdx];
    if (!target) return;
    let startIdx = 0;
    for (let i = 0; i < state.selectedGroupIdx; i++) startIdx += groups[i].count;
    state.bars.splice(startIdx, target.count);
    state.selectedGroupIdx = null;
    renderTimeline();
    renderActions();
  }

  function handleClear() {
    if (state.bars.length === 0) return;
    // Skip the confirm() once finalized: the user has already committed by
    // hitting Finish, and browsers can silently suppress confirm() shortly
    // after a programmatic download triggers (which is exactly when the
    // user would want to clear post-export).
    if (!state.finalized && !confirm('Clear the entire timeline?')) return;
    state.bars = [];
    state.selectedGroupIdx = null;
    state.finalized = false;
    $summary.classList.remove('active');
    renderTimeline();
    renderActions();
  }

  function handleEnd() {
    if (state.bars.length === 0) return;
    state.finalized = true;
    state.selectedGroupIdx = null;
    renderSummary();
    renderTimeline();
    renderActions();
    $summary.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ─── SUMMARY ─────────────────────────────────────────────────────
  function toTitleCase(name) {
    return name.split('-').map(part => part.charAt(0) + part.slice(1).toLowerCase()).join('-');
  }

  function buildObservations(groups) {
    const obs = [];
    const counts = {};
    const totalBarsPerSection = {};
    groups.forEach(g => {
      counts[g.name] = (counts[g.name] || 0) + 1;
      totalBarsPerSection[g.name] = (totalBarsPerSection[g.name] || 0) + g.count;
    });

    const totalBars = state.bars.length;
    const distinctSections = Object.keys(counts).length;

    let mostRepeated = null;
    let mostRepeatedCount = 0;
    Object.entries(counts).forEach(([name, c]) => {
      if (c > mostRepeatedCount) { mostRepeated = name; mostRepeatedCount = c; }
    });

    let longest = null;
    let longestBars = 0;
    groups.forEach(g => {
      if (g.count > longestBars) { longest = g.name; longestBars = g.count; }
    });

    if (mostRepeated && mostRepeatedCount > 1) {
      const percent = Math.round((totalBarsPerSection[mostRepeated] / totalBars) * 100);
      obs.push(`<strong>${toTitleCase(mostRepeated)}</strong> appears ${mostRepeatedCount} times (${totalBarsPerSection[mostRepeated]} bars / ${percent}% of the song).`);
    }

    if (longest) {
      obs.push(`Longest single section: <strong>${toTitleCase(longest)}</strong> at ${longestBars} bars.`);
    }

    const sequence = groups.map(g => g.name);
    if (state.mode === 'pop') {
      const hasVerseChorus = sequence.some((s, i) => s === 'VERSE' && sequence[i+1] === 'CHORUS');
      const hasBridge = sequence.includes('BRIDGE');
      if (hasVerseChorus && hasBridge) {
        obs.push(`Classic <strong>verse-chorus form with a bridge</strong> — the bread and butter of pop songwriting.`);
      } else if (hasVerseChorus) {
        obs.push(`Verse-chorus form — the foundation of most pop songs.`);
      }
    } else if (state.mode === 'hiphop') {
      const verseCount = counts['VERSE'] || 0;
      const hookCount = counts['HOOK'] || 0;
      if (verseCount >= 2 && hookCount >= 2) {
        obs.push(`Standard hip-hop form: <strong>verse — hook — verse — hook</strong> arrangement.`);
      }
    } else if (state.mode === 'electronic') {
      const dropCount = counts['DROP'] || 0;
      const hasFakeDrop = counts['FAKE DROP'] > 0;
      if (dropCount >= 2) {
        obs.push(`<strong>Two drops</strong> — classic festival EDM arrangement. The second drop usually hits hardest.`);
      }
      if (hasFakeDrop) {
        obs.push(`Includes a <strong>fake drop</strong> — a structural fake-out that makes the real drop land harder.`);
      }
    }

    obs.push(`Total: <strong>${totalBars} bars</strong> across <strong>${groups.length} sections</strong> (${distinctSections} distinct).`);
    return obs;
  }

  function buildCopyText(groups) {
    const lines = [];
    lines.push(`SONG STRUCTURE — ${MODE_LABELS[state.mode]}`);
    lines.push(`Total: ${state.bars.length} bars`);
    lines.push('');
    groups.forEach(g => {
      lines.push(`${toTitleCase(g.name)} - ${g.count} ${g.count === 1 ? 'bar' : 'bars'}`);
    });
    return lines.join('\n');
  }

  function renderSummary() {
    const groups = groupedBars();
    if (groups.length === 0) return;

    const observations = buildObservations(groups);
    const flow = groups.map(g => `${toTitleCase(g.name)}(${g.count})`).join('  →  ');

    $summary.innerHTML = `
      <div class="summary-header">
        <div class="summary-title">YOUR SONG STRUCTURE</div>
        <div class="summary-mode">${MODE_LABELS[state.mode]}</div>
      </div>

      <div class="summary-stats">
        <div>
          <div class="stat-label">Total Bars</div>
          <div class="stat-value"><strong>${state.bars.length}</strong></div>
        </div>
        <div>
          <div class="stat-label">Sections</div>
          <div class="stat-value"><strong>${groups.length}</strong></div>
        </div>
        <div>
          <div class="stat-label">Distinct</div>
          <div class="stat-value"><strong>${Object.keys(groups.reduce((a, g) => (a[g.name] = 1, a), {})).length}</strong></div>
        </div>
      </div>

      <div class="stat-label" style="margin-bottom: 6px;">Flow</div>
      <div class="summary-list">${flow}</div>

      <div class="summary-observations">
        ${observations.map(o => `<div>• ${o}</div>`).join('')}
      </div>

      <div class="summary-actions">
        <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>
        <button class="export-btn" id="exportAlsBtn">Export Ableton Set</button>
      </div>
    `;
    $summary.classList.add('active');

    document.getElementById('copyBtn').addEventListener('click', handleCopy);
    document.getElementById('exportAlsBtn').addEventListener('click', handleExportAls);
  }

  async function handleCopy() {
    const groups = groupedBars();
    const text = buildCopyText(groups);
    const btn = document.getElementById('copyBtn');

    try {
      await navigator.clipboard.writeText(text);
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy to Clipboard';
        btn.classList.remove('copied');
      }, 2000);
    } catch (err) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy to Clipboard';
          btn.classList.remove('copied');
        }, 2000);
      } catch (e) {
        btn.textContent = 'Copy failed — select & copy manually';
      }
      document.body.removeChild(ta);
    }
  }

  function base64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function gunzipBytes(bytes) {
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    return await new Response(stream).text();
  }

  async function gzipString(str) {
    const stream = new Blob([str]).stream().pipeThrough(new CompressionStream('gzip'));
    return await new Response(stream).arrayBuffer();
  }

  function escapeXml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&apos;'
    }[c]));
  }

  function groupsToLocators(groups) {
    // 4/4 fixed: bar N starts at beat (N-1) * 4.
    // Locator i starts at cumulative bars so far * 4.
    const locators = [];
    let cumulativeBars = 0;
    groups.forEach(g => {
      locators.push({ name: g.name, beats: cumulativeBars * 4 });
      cumulativeBars += g.count;
    });
    return locators;
  }

  function buildLocatorXml(locators) {
    let block = '<Locators>\n';
    locators.forEach((loc, i) => {
      block += `\t\t\t\t<Locator Id="${i}">\n`;
      block += `\t\t\t\t\t<LomId Value="0" />\n`;
      block += `\t\t\t\t\t<Time Value="${loc.beats}" />\n`;
      block += `\t\t\t\t\t<Name Value="${escapeXml(loc.name)}" />\n`;
      block += `\t\t\t\t\t<Annotation Value="" />\n`;
      block += `\t\t\t\t\t<IsSongStart Value="false" />\n`;
      block += `\t\t\t\t</Locator>\n`;
    });
    block += '\t\t\t</Locators>';
    return block;
  }

  async function handleExportAls() {
    const btn = document.getElementById('exportAlsBtn');
    const originalText = btn ? btn.textContent : 'Export Ableton Set';

    try {
      const groups = groupedBars();
      if (groups.length === 0) return;

      const locators = groupsToLocators(groups);
      const locatorBlock = buildLocatorXml(locators);

      const templateBytes = base64ToBytes(ABLETON_TEMPLATE_B64);
      const xml = await gunzipBytes(templateBytes);

      // The template contains exactly one <Locators /> self-closing tag.
      if (!xml.includes('<Locators />')) {
        throw new Error('Template missing expected empty <Locators /> node');
      }
      const newXml = xml.replace('<Locators />', locatorBlock);

      const compressed = await gzipString(newXml);

      const dateStr = new Date().toISOString().split('T')[0];
      const filename = `song-structure-${state.mode}-${dateStr}.als`;

      const blob = new Blob([compressed], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);

      if (btn) {
        btn.textContent = 'Exported ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('copied');
        }, 2000);
      }
    } catch (err) {
      console.error('Ableton export failed:', err);
      if (btn) {
        btn.textContent = 'Export failed';
        btn.classList.add('failed');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('failed');
        }, 2500);
      }
    }
  }

  // ─── WIRE UP ─────────────────────────────────────────────────────
  $modeTabs.addEventListener('click', (e) => {
    if (e.target.matches('.mode-tab')) handleModeChange(e.target.dataset.mode);
  });
  $undoBtn.addEventListener('click', handleUndo);
  $deleteBtn.addEventListener('click', handleDelete);
  $clearBtn.addEventListener('click', handleClear);
  $endBtn.addEventListener('click', handleEnd);

  $timeline.addEventListener('click', (e) => {
    if (e.target === $timeline) {
      state.selectedGroupIdx = null;
      renderTimeline();
      renderActions();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      state.selectedGroupIdx = null;
      renderTimeline();
      renderActions();
    }
  });

  renderAll();
</script>
</body>
</html>
