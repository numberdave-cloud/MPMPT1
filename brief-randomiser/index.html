<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E1A17;
    --text: #EAE0D0;
    --text-dim: rgba(234, 224, 208, 0.55);
    --text-faint: rgba(234, 224, 208, 0.3);
    --accent: #C07838;
    --accent-glow: #D8904A;
    --clip: #C04838;
    --success: #7BA968;
    --border: rgba(234, 224, 208, 0.15);
    --border-bright: rgba(234, 224, 208, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    padding: 28px 24px 32px;
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  /* ─── BRIEF CARD ─── */
  .brief-card {
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 22px 26px 26px;
    margin-bottom: 22px;
  }

  .brief-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 16px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }

  .brief-title {
    font-size: 14px;
    letter-spacing: 0.28em;
    font-weight: 600;
  }

  .brief-no {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  /* ─── FIELDS ─── */
  .field {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .field:last-child { border-bottom: none; padding-bottom: 2px; }

  .field-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .field.avoid .field-label { color: var(--clip); opacity: 0.85; }

  .field-value {
    font-size: 20px;
    line-height: 1.35;
    font-weight: 500;
    color: var(--text);
    transition: color 0.12s, transform 0.06s, opacity 0.06s;
    min-height: 27px;
  }

  .field.catch .field-value {
    color: var(--accent-glow);
    font-weight: 600;
  }

  /* cycling / landing states */
  .field-value.cycling {
    color: var(--text-dim);
    opacity: 0.7;
  }
  .field.catch .field-value.cycling { color: var(--text-dim); }
  .field-value.land { color: var(--accent); }
  .field.catch .field-value.land { color: var(--accent-glow); }

  /* ─── ACTIONS ─── */
  .actions {
    display: flex;
    gap: 10px;
  }

  .spin-btn {
    flex: 2;
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    padding: 17px 24px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.28em;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, opacity 0.1s, transform 0.05s;
  }
  .spin-btn:hover:not(:disabled) {
    background: var(--accent-glow);
    border-color: var(--accent-glow);
  }
  .spin-btn:active:not(:disabled) { transform: translateY(1px); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .copy-btn {
    flex: 1;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 17px 20px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.2em;
    font-weight: 600;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.1s, color 0.1s, background 0.1s, transform 0.05s;
  }
  .copy-btn:hover:not(:disabled) { border-color: var(--border-bright); }
  .copy-btn:active:not(:disabled) { transform: translateY(1px); }
  .copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  @media (max-width: 560px) {
    body { padding: 18px 16px 24px; }
    .brief-card { padding: 18px 18px 22px; }
    .field-value { font-size: 18px; }
    .spin-btn { font-size: 13px; letter-spacing: 0.22em; }
  }
</style>
</head>
<body>
  <div class="brief-card">
    <div class="brief-head">
      <div class="brief-title">BRIEF GENERATOR</div>
      <div class="brief-no" id="briefNo">BRIEF NO. 0000</div>
    </div>
    <div id="fields"></div>
  </div>

  <div class="actions">
    <button class="spin-btn" id="spinBtn">New Brief</button>
    <button class="copy-btn" id="copyBtn">Copy</button>
  </div>

<script>
  // ─── POOLS (approved) ──────────────────────────────────────────
  const POOLS = {
    genre: [
      'Space Opera','Cyberpunk Dystopia','Cosmic Horror','Slasher','Psychological Horror',
      'Rom-Com','Coming-of-Age','Drama','Crime Thriller','Spy Thriller','Neo-Noir','Western',
      'War','Historical Epic','Heist','Action Blockbuster','Superhero','Disaster',
      'Nature Doc','True-Crime Doc','Animated Family','Anime','Fantasy Epic','Period Romance',
      'Sports Underdog','Survival/Wilderness'
    ],
    scene: [
      'main title','end credits','a slow tension build','a full chase','a quiet dialogue two-hander',
      'a time-passing montage','a training montage','a reveal or twist','a first meeting','a goodbye',
      'a victory','a descent into danger','a dream sequence','a flashback','the calm before the storm',
      'a romantic peak','a standoff','a travelling sequence','the moment it all falls apart',
      'underscore that has to sit under heavy dialogue'
    ],
    feel: [
      'dread','wonder','awe','heartbreak','nostalgia','unease','triumph','hope','grief','tension',
      'playfulness','menace','longing','euphoria','isolation','warmth','paranoia','melancholy',
      'defiance','tenderness','serenity','bittersweet','righteous anger','creeping horror'
    ],
    style: [
      'Hans Zimmer','John Williams','Ennio Morricone','John Carpenter','Bernard Herrmann','Vangelis',
      'Trent Reznor and Atticus Ross','Jóhann Jóhannsson','Max Richter','Ludwig Göransson','Danny Elfman',
      'Thomas Newman','Clint Mansell','Cliff Martinez','Angelo Badalamenti','Nino Rota',
      'Hildur Guðnadóttir','Mica Levi','Ryuichi Sakamoto','Wendy Carlos','Tangerine Dream','Goblin',
      'Howard Shore'
    ],
    catch: [
      'no melody allowed','epic but intimate','the director keeps saying "make it more red"',
      'one instrument only','no more than three notes','silence is on the table, so justify every note',
      'cannot sound like other contemporary scores','it has to sound squishy',
      "inside the character's head",'make it more purple','it needs to sound wet',
      'warmer, but somehow colder','like a half-remembered memory','like a smell you can\'t quite place',
      'the inside of a cathedral, but sad','built only from sounds that could exist in the film\'s world',
      'must reflect the subtext of the dialogue, not the words',"score what the character isn't saying",
      "built entirely from something that isn't a musical instrument"
    ]
  };

  // Include / off-limits carry family tags so the same thing can't land in both.
  const INCLUDE = [
    { t: 'solo piano',                 tags: ['piano'] },
    { t: 'full orchestra',             tags: ['orchestra','strings','brass','drums'] },
    { t: 'analog synths',              tags: ['electronic'] },
    { t: 'a modular bleep bed',        tags: ['electronic'] },
    { t: 'a string quartet',           tags: ['strings'] },
    { t: 'taiko drums',                tags: ['drums'] },
    { t: 'a lone cello',               tags: ['strings'] },
    { t: 'distorted electric guitar',  tags: ['guitars'] },
    { t: 'fingerpicked acoustic guitar', tags: ['guitars'] },
    { t: 'adult choir',                tags: ['vocals'] },
    { t: "children's choir",           tags: ['vocals'] },
    { t: 'a wordless female vocal',    tags: ['vocals'] },
    { t: 'brass section',              tags: ['brass'] },
    { t: 'a solo trumpet',             tags: ['brass'] },
    { t: 'prepared piano',             tags: ['piano'] },
    { t: 'harp',                       tags: [] },
    { t: 'pipe organ',                 tags: [] },
    { t: 'a music box',                tags: [] },
    { t: 'banjo',                      tags: [] },
    { t: 'a Rhodes',                   tags: [] },
    { t: 'a Mellotron',                tags: [] },
    { t: 'a theremin',                 tags: ['electronic'] },
    { t: 'an 808',                     tags: ['electronic','drums'] },
    { t: 'hand percussion',            tags: ['drums'] },
    { t: 'a whistled melody',          tags: ['melody'] },
    { t: 'a ukulele',                  tags: ['guitars'] },
    { t: 'a duduk',                    tags: [] },
    { t: 'sub bass',                   tags: ['sublow'] },
    { t: 'saxophone',                  tags: [] }
  ];

  const AVOID = [
    { t: 'drums or percussion',        bans: ['drums'] },
    { t: 'piano',                      bans: ['piano'] },
    { t: 'orchestra',                  bans: ['orchestra'] },
    { t: 'anything electronic',        bans: ['electronic'] },
    { t: 'strings',                    bans: ['strings'] },
    { t: 'melody',                     bans: ['melody'] },
    { t: 'guitars',                    bans: ['guitars'] },
    { t: 'sub or low end',             bans: ['sublow'] },
    { t: 'anything epic',              bans: [] },
    { t: 'brass',                      bans: ['brass'] },
    { t: 'vocals',                     bans: ['vocals'] },
    { t: 'major keys',                 bans: [] },
    { t: 'reverb',                     bans: [] },
    { t: 'traditional harmony',        bans: [] },
    { t: 'anything that sounds like a trailer', bans: [] },
    { t: 'metronomic tempo',           bans: [] },
    { t: 'anything recognisably "movie music"', bans: [] }
  ];

  const REELS = [
    { key: 'genre',   label: 'Genre' },
    { key: 'scene',   label: 'The scene' },
    { key: 'feel',    label: 'Audience feels' },
    { key: 'style',   label: 'In the style of' },
    { key: 'include', label: 'Must include' },
    { key: 'avoid',   label: 'Off-limits', extraClass: 'avoid' },
    { key: 'catch',   label: 'The catch', extraClass: 'catch' }
  ];

  // ─── DOM ───────────────────────────────────────────────────────
  const $fields = document.getElementById('fields');
  const $spin = document.getElementById('spinBtn');
  const $copy = document.getElementById('copyBtn');
  const $briefNo = document.getElementById('briefNo');

  const valueEls = {};
  let current = null;

  REELS.forEach(r => {
    const field = document.createElement('div');
    field.className = 'field' + (r.extraClass ? ' ' + r.extraClass : '');
    const label = document.createElement('div');
    label.className = 'field-label';
    label.textContent = r.label;
    const value = document.createElement('div');
    value.className = 'field-value';
    field.appendChild(label);
    field.appendChild(value);
    $fields.appendChild(field);
    valueEls[r.key] = value;
  });

  // ─── PICKERS ───────────────────────────────────────────────────
  function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function pickStr(key, prevVal) {
    const cands = POOLS[key].filter(v => v !== prevVal);
    return rand(cands.length ? cands : POOLS[key]);
  }
  function pickInclude(prevText) {
    const cands = INCLUDE.filter(o => o.t !== prevText);
    return rand(cands.length ? cands : INCLUDE);
  }
  function pickAvoid(includeTags, prevText) {
    const safe = AVOID.filter(a => a.bans.every(b => !includeTags.includes(b)));
    let cands = safe.filter(a => a.t !== prevText);
    if (!cands.length) cands = safe;
    return rand(cands);
  }

  function rollBrief(prev) {
    const inc = pickInclude(prev ? prev.include : null);
    const avo = pickAvoid(inc.tags, prev ? prev.avoid : null);
    return {
      genre:   pickStr('genre', prev ? prev.genre : null),
      scene:   pickStr('scene', prev ? prev.scene : null),
      feel:    pickStr('feel',  prev ? prev.feel  : null),
      style:   pickStr('style', prev ? prev.style : null),
      include: inc.t,
      avoid:   avo.t,
      catch:   pickStr('catch', prev ? prev.catch : null)
    };
  }

  function randDisplay(key) {
    if (key === 'include') return rand(INCLUDE).t;
    if (key === 'avoid')   return rand(AVOID).t;
    return rand(POOLS[key]);
  }

  function briefNumber() { return String(Math.floor(1000 + Math.random() * 9000)); }

  function applyBrief(brief) {
    REELS.forEach(r => { valueEls[r.key].textContent = brief[r.key]; });
    $briefNo.textContent = 'BRIEF NO. ' + briefNumber();
    current = brief;
  }

  // ─── SPIN ──────────────────────────────────────────────────────
  let spinning = false;

  function spin() {
    if (spinning) return;
    spinning = true;
    $spin.disabled = true;
    $copy.disabled = true;
    resetCopyBtn();

    const final = rollBrief(current);

    const CYCLE_MS = 55;
    const FIRST_STOP = 480;
    const STAGGER = 165;

    const numTimer = setInterval(() => {
      $briefNo.textContent = 'BRIEF NO. ' + briefNumber();
    }, CYCLE_MS);

    let lastStop = 0;

    REELS.forEach((r, i) => {
      const el = valueEls[r.key];
      el.classList.add('cycling');
      const cycleTimer = setInterval(() => { el.textContent = randDisplay(r.key); }, CYCLE_MS);
      const stopAt = FIRST_STOP + i * STAGGER;
      lastStop = stopAt;
      setTimeout(() => {
        clearInterval(cycleTimer);
        el.textContent = final[r.key];
        el.classList.remove('cycling');
        el.classList.add('land');
        setTimeout(() => el.classList.remove('land'), 220);
      }, stopAt);
    });

    setTimeout(() => {
      clearInterval(numTimer);
      $briefNo.textContent = 'BRIEF NO. ' + briefNumber();
      current = final;
      spinning = false;
      $spin.disabled = false;
      $copy.disabled = false;
    }, lastStop + 260);
  }

  // ─── COPY ──────────────────────────────────────────────────────
  function buildCopyText() {
    const lines = [$briefNo.textContent, ''];
    REELS.forEach(r => lines.push(r.label.toUpperCase() + ': ' + current[r.key]));
    return lines.join('\n');
  }

  function resetCopyBtn() {
    $copy.textContent = 'Copy';
    $copy.classList.remove('copied');
  }

  function flashCopied() {
    $copy.textContent = 'Copied \u2713';
    $copy.classList.add('copied');
    setTimeout(resetCopyBtn, 1800);
  }

  async function handleCopy() {
    if (spinning || !current) return;
    const text = buildCopyText();
    try {
      await navigator.clipboard.writeText(text);
      flashCopied();
    } catch (err) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); flashCopied(); }
      catch (e) { $copy.textContent = 'Copy failed'; }
      document.body.removeChild(ta);
    }
  }

  $spin.addEventListener('click', spin);
  $copy.addEventListener('click', handleCopy);

  // land on a real brief immediately so the card is never empty
  applyBrief(rollBrief(null));
</script>
</body>
</html>
