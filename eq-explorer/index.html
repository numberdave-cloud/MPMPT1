<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EQ Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #1E1A17;
    color: #EAE0D0;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .widget {
    width: 100%;
    max-width: 420px;
    border: 1px solid #3a3128;
    padding: 28px 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .header {
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 11px;
    font-weight: 500;
    color: #EAE0D0;
    text-align: center;
    padding-bottom: 14px;
    border-bottom: 1px solid #3a3128;
  }

  .readout-strip {
    border: 1px solid #3a3128;
    padding: 12px 16px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    min-height: 64px;
    justify-content: center;
  }

  .readout-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #6e6358;
    text-transform: uppercase;
    font-weight: 500;
  }

  .readout-value {
    font-size: 18px;
    letter-spacing: 0.18em;
    font-weight: 500;
    color: #C07838;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .channel-strip {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 4px 0;
  }

  .band {
    display: grid;
    grid-template-columns: 56px 1fr 60px 64px;
    align-items: center;
    gap: 14px;
  }

  .band-label {
    font-size: 10px;
    letter-spacing: 0.28em;
    font-weight: 500;
    text-transform: uppercase;
    color: #EAE0D0;
  }

  .knob-cell {
    display: flex;
    justify-content: center;
  }

  .knob {
    cursor: ns-resize;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .db-readout {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    color: #EAE0D0;
    text-align: right;
    letter-spacing: 0.05em;
  }

  .db-readout.changed {
    color: #C07838;
  }

  .solo-btn {
    background: transparent;
    border: 1px solid #6e6358;
    color: #6e6358;
    padding: 5px 0;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    text-align: center;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
  }

  .solo-btn:hover {
    color: #C07838;
    border-color: #C07838;
  }

  .solo-btn.active {
    color: #1E1A17;
    background: #C07838;
    border-color: #C07838;
  }

  .transport {
    display: flex;
    gap: 10px;
    border-top: 1px solid #3a3128;
    padding-top: 18px;
    justify-content: center;
  }

  .transport-btn {
    background: transparent;
    border: 1px solid #EAE0D0;
    color: #EAE0D0;
    padding: 9px 24px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    min-width: 110px;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
  }

  .transport-btn:hover {
    border-color: #C07838;
    color: #C07838;
  }

  .transport-btn.active {
    background: #C07838;
    border-color: #C07838;
    color: #1E1A17;
  }

  .transport-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  .transport-btn:disabled:hover {
    border-color: #EAE0D0;
    color: #EAE0D0;
  }

  .channel-strip.solo-active .band:not(.soloed) .db-readout,
  .channel-strip.solo-active .band:not(.soloed) .knob {
    opacity: 0.35;
  }
</style>
</head>
<body>

<div class="widget">

  <div class="header">EQ Explorer</div>

  <div class="readout-strip">
    <div class="readout-label">Character</div>
    <div class="readout-value" id="readout">Flat</div>
  </div>

  <div class="channel-strip" id="strip">
    <div class="band" data-band="hi">
      <div class="band-label">High</div>
      <div class="knob-cell" id="knob-hi"></div>
      <div class="db-readout" id="db-hi">&nbsp;0 dB</div>
      <button class="solo-btn" data-solo="hi">Solo</button>
    </div>
    <div class="band" data-band="mid">
      <div class="band-label">Mid</div>
      <div class="knob-cell" id="knob-mid"></div>
      <div class="db-readout" id="db-mid">&nbsp;0 dB</div>
      <button class="solo-btn" data-solo="mid">Solo</button>
    </div>
    <div class="band" data-band="lo">
      <div class="band-label">Low</div>
      <div class="knob-cell" id="knob-lo"></div>
      <div class="db-readout" id="db-lo">&nbsp;0 dB</div>
      <button class="solo-btn" data-solo="lo">Solo</button>
    </div>
  </div>

  <div class="transport">
    <button class="transport-btn" id="play-btn">Play</button>
    <button class="transport-btn" id="bypass-btn">Bypass</button>
  </div>

</div>

const SVG_NS = 'http://www.w3.org/2000/svg';
const COLOR_FG = '#EAE0D0';
const COLOR_ACCENT = '#C07838';
const COLOR_ACCENT_HOT = '#D8904A';
const COLOR_BG = '#1E1A17';
const COLOR_DIM = '#6e6358';

function createKnob(container, onChange) {
  const SIZE = 72;
  const RADIUS = 26;
  const C = SIZE / 2;

  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('width', SIZE);
  svg.setAttribute('height', SIZE);
  svg.setAttribute('viewBox', `0 0 ${SIZE} ${SIZE}`);
  svg.classList.add('knob');

  const face = document.createElementNS(SVG_NS, 'circle');
  face.setAttribute('cx', C);
  face.setAttribute('cy', C);
  face.setAttribute('r', RADIUS);
  face.setAttribute('fill', COLOR_BG);
  face.setAttribute('stroke', COLOR_FG);
  face.setAttribute('stroke-width', '1');
  svg.appendChild(face);

  const tick = document.createElementNS(SVG_NS, 'line');
  tick.setAttribute('x1', C);
  tick.setAttribute('y1', C - RADIUS - 2);
  tick.setAttribute('x2', C);
  tick.setAttribute('y2', C - RADIUS - 7);
  tick.setAttribute('stroke', COLOR_FG);
  tick.setAttribute('stroke-width', '1');
  svg.appendChild(tick);

  const indicator = document.createElementNS(SVG_NS, 'line');
  indicator.setAttribute('x1', C);
  indicator.setAttribute('y1', C);
  indicator.setAttribute('x2', C);
  indicator.setAttribute('y2', C - RADIUS + 5);
  indicator.setAttribute('stroke', COLOR_FG);
  indicator.setAttribute('stroke-width', '2');
  indicator.setAttribute('stroke-linecap', 'round');
  svg.appendChild(indicator);

  let value = 0;

  function render() {
    const angle = value * 15;
    indicator.setAttribute('transform', `rotate(${angle} ${C} ${C})`);
    const offCentre = value !== 0;
    indicator.setAttribute('stroke', offCentre ? COLOR_ACCENT : COLOR_FG);
    face.setAttribute('stroke', offCentre ? COLOR_ACCENT : COLOR_FG);
  }

  function setValue(v) {
    const clamped = Math.max(-9, Math.min(9, Math.round(v)));
    if (clamped !== value) {
      value = clamped;
      render();
      onChange(value);
    } else {
      value = clamped;
      render();
    }
  }

  const PX_PER_STEP = 7;
  let dragging = false;
  let startY = 0;
  let startValue = 0;

  function onDown(clientY) {
    dragging = true;
    startY = clientY;
    startValue = value;
    face.setAttribute('stroke', COLOR_ACCENT_HOT);
    indicator.setAttribute('stroke', COLOR_ACCENT_HOT);
  }

  function onMove(clientY) {
    if (!dragging) return;
    const dy = startY - clientY;
    const steps = Math.round(dy / PX_PER_STEP);
    setValue(startValue + steps);
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    render();
  }

  svg.addEventListener('mousedown', e => { e.preventDefault(); onDown(e.clientY); });
  document.addEventListener('mousemove', e => onMove(e.clientY));
  document.addEventListener('mouseup', onUp);

  svg.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientY); }, { passive: false });
  document.addEventListener('touchmove', e => { if (dragging) onMove(e.touches[0].clientY); }, { passive: true });
  document.addEventListener('touchend', onUp);
  document.addEventListener('touchcancel', onUp);

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    setValue(value + (e.deltaY < 0 ? 1 : -1));
  }, { passive: false });

  svg.addEventListener('dblclick', () => setValue(0));

  container.appendChild(svg);
  render();

  return {
    get value() { return value; },
    setValue
  };
}

let audioCtx = null;
let audioBuffer = null;
let isPlaying = false;
let nextStartTime = 0;
let schedulerTimer = null;
let scheduledSources = [];

let inputNode, lowShelf, midPeak, highShelf;
let eqGain, bypassGain, soloLoGain, soloMidGain, soloHiGain;
let soloLoFilter, soloMidFilter, soloHiFilter;
let masterGain;

let bypassActive = false;
let activeSolo = null;

function setupGraph() {
  inputNode = audioCtx.createGain();
  inputNode.gain.value = 1;

  lowShelf = audioCtx.createBiquadFilter();
  lowShelf.type = 'lowshelf';
  lowShelf.frequency.value = 100;
  lowShelf.gain.value = 0;

  midPeak = audioCtx.createBiquadFilter();
  midPeak.type = 'peaking';
  midPeak.frequency.value = 750;
  midPeak.Q.value = 0.7;
  midPeak.gain.value = 0;

  highShelf = audioCtx.createBiquadFilter();
  highShelf.type = 'highshelf';
  highShelf.frequency.value = 4000;
  highShelf.gain.value = 0;

  eqGain = audioCtx.createGain();
  bypassGain = audioCtx.createGain();
  soloLoGain = audioCtx.createGain();
  soloMidGain = audioCtx.createGain();
  soloHiGain = audioCtx.createGain();

  soloLoFilter = audioCtx.createBiquadFilter();
  soloLoFilter.type = 'lowpass';
  soloLoFilter.frequency.value = 220;
  soloLoFilter.Q.value = 0.7;

  soloMidFilter = audioCtx.createBiquadFilter();
  soloMidFilter.type = 'bandpass';
  soloMidFilter.frequency.value = 750;
  soloMidFilter.Q.value = 0.9;

  soloHiFilter = audioCtx.createBiquadFilter();
  soloHiFilter.type = 'highpass';
  soloHiFilter.frequency.value = 3500;
  soloHiFilter.Q.value = 0.7;

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8;

  inputNode.connect(lowShelf);
  lowShelf.connect(midPeak);
  midPeak.connect(highShelf);
  highShelf.connect(eqGain);
  eqGain.connect(masterGain);

  inputNode.connect(bypassGain);
  bypassGain.connect(masterGain);

  inputNode.connect(soloLoFilter);
  soloLoFilter.connect(soloLoGain);
  soloLoGain.connect(masterGain);

  inputNode.connect(soloMidFilter);
  soloMidFilter.connect(soloMidGain);
  soloMidGain.connect(masterGain);

  inputNode.connect(soloHiFilter);
  soloHiFilter.connect(soloHiGain);
  soloHiGain.connect(masterGain);

  masterGain.connect(audioCtx.destination);

  applyRouting();
}

function applyRouting() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const tc = 0.012;
  const gains = {
    eq: eqGain,
    bypass: bypassGain,
    soloLo: soloLoGain,
    soloMid: soloMidGain,
    soloHi: soloHiGain
  };
  let active;
  if (activeSolo === 'lo') active = 'soloLo';
  else if (activeSolo === 'mid') active = 'soloMid';
  else if (activeSolo === 'hi') active = 'soloHi';
  else if (bypassActive) active = 'bypass';
  else active = 'eq';

  for (const [name, node] of Object.entries(gains)) {
    node.gain.setTargetAtTime(name === active ? 1 : 0, t, tc);
  }
}

async function ensureAudio() {
  if (audioCtx && audioBuffer) return;
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    setupGraph();
  }
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
  }
  if (!audioBuffer) {
    const binary = atob(BASE64_AUDIO);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
  }
}

const SCHEDULE_AHEAD = 0.25;
const LOOKAHEAD_MS = 50;

function tick() {
  if (!isPlaying || !audioBuffer) return;
  while (nextStartTime < audioCtx.currentTime + SCHEDULE_AHEAD) {
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(inputNode);
    src.start(nextStartTime);
    scheduledSources.push(src);
    src.onended = () => {
      const i = scheduledSources.indexOf(src);
      if (i >= 0) scheduledSources.splice(i, 1);
    };
    nextStartTime += audioBuffer.duration;
  }
}

async function startPlayback() {
  await ensureAudio();
  if (isPlaying) return;
  isPlaying = true;
  nextStartTime = audioCtx.currentTime + 0.06;
  tick();
  schedulerTimer = setInterval(tick, LOOKAHEAD_MS);
}

function stopPlayback() {
  isPlaying = false;
  if (schedulerTimer) {
    clearInterval(schedulerTimer);
    schedulerTimer = null;
  }
  for (const s of scheduledSources) {
    try { s.stop(); } catch (e) {}
  }
  scheduledSources = [];
}

function formatDb(v) {
  if (v === 0) return '\u00a00 dB';
  return (v > 0 ? '+' : '') + v + ' dB';
}

function describeCurve(lo, mid, hi) {
  const aLo = Math.abs(lo), aMid = Math.abs(mid), aHi = Math.abs(hi);
  if (aLo <= 1 && aMid <= 1 && aHi <= 1) return 'Flat';

  if (lo >= 4 && mid <= -3 && hi >= 4) return 'Smiley / Hyped';
  if (lo <= -4 && hi <= -4) return 'Telephone';
  if (lo >= 5 && hi >= 5 && aMid <= 2) return 'Big / Excited';

  if (lo >= 4 && hi <= -3) return 'Muddy / Dark';
  if (lo >= 3 && hi <= -2) return 'Warm / Dark';

  if (lo <= -3 && hi >= 4) return 'Thin / Bright';
  if (lo <= -2 && hi >= 3) return 'Light / Open';

  if (mid >= 5) return 'Honky';
  if (mid >= 3) return 'Boxy / Forward';
  if (mid <= -5) return 'Scooped';
  if (mid <= -3) return 'Hollow';

  if (lo >= 5) return 'Boomy';
  if (hi >= 5) return 'Airy / Bright';
  if (lo <= -5) return 'Thin';
  if (hi <= -5) return 'Dull';

  if (lo >= 3) return 'Warm';
  if (hi >= 3) return 'Bright';
  if (lo <= -3) return 'Light';
  if (hi <= -3) return 'Dark';

  return 'Coloured';
}

const knobLo = createKnob(document.getElementById('knob-lo'), v => {
  if (lowShelf) lowShelf.gain.setTargetAtTime(v, audioCtx.currentTime, 0.01);
  updateReadouts();
});
const knobMid = createKnob(document.getElementById('knob-mid'), v => {
  if (midPeak) midPeak.gain.setTargetAtTime(v, audioCtx.currentTime, 0.01);
  updateReadouts();
});
const knobHi = createKnob(document.getElementById('knob-hi'), v => {
  if (highShelf) highShelf.gain.setTargetAtTime(v, audioCtx.currentTime, 0.01);
  updateReadouts();
});

function updateReadouts() {
  const lo = knobLo.value;
  const mid = knobMid.value;
  const hi = knobHi.value;

  const dbLo = document.getElementById('db-lo');
  const dbMid = document.getElementById('db-mid');
  const dbHi = document.getElementById('db-hi');
  dbLo.textContent = formatDb(lo);
  dbMid.textContent = formatDb(mid);
  dbHi.textContent = formatDb(hi);
  dbLo.classList.toggle('changed', lo !== 0);
  dbMid.classList.toggle('changed', mid !== 0);
  dbHi.classList.toggle('changed', hi !== 0);

  const readout = document.getElementById('readout');
  if (activeSolo) {
    const map = { lo: 'Solo · Low', mid: 'Solo · Mid', hi: 'Solo · High' };
    readout.textContent = map[activeSolo];
  } else if (bypassActive) {
    readout.textContent = 'Bypass';
  } else {
    readout.textContent = describeCurve(lo, mid, hi);
  }
}

document.querySelectorAll('.solo-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const band = btn.dataset.solo;
    if (activeSolo === band) {
      activeSolo = null;
    } else {
      activeSolo = band;
    }
    document.querySelectorAll('.solo-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.solo === activeSolo);
    });
    document.querySelectorAll('.band').forEach(b => {
      b.classList.toggle('soloed', b.dataset.band === activeSolo);
    });
    document.getElementById('strip').classList.toggle('solo-active', !!activeSolo);
    applyRouting();
    updateReadouts();
  });
});

const playBtn = document.getElementById('play-btn');
playBtn.addEventListener('click', async () => {
  if (isPlaying) {
    stopPlayback();
    playBtn.textContent = 'Play';
    playBtn.classList.remove('active');
  } else {
    playBtn.textContent = 'Loading…';
    try {
      await startPlayback();
      playBtn.textContent = 'Stop';
      playBtn.classList.add('active');
    } catch (e) {
      playBtn.textContent = 'Play';
      console.error(e);
    }
  }
});

const bypassBtn = document.getElementById('bypass-btn');
bypassBtn.addEventListener('click', () => {
  bypassActive = !bypassActive;
  bypassBtn.classList.toggle('active', bypassActive);
  applyRouting();
  updateReadouts();
});

updateReadouts();
</script>

</body>
</html>
