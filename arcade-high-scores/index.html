<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interval Trainer — High Scores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    /* palette vars are set by JS from the chosen palette; classic defaults below */
    --g1:#ff2d3b; --g1-rgb:255,45,59;
    --g2:#ffd84d; --g2-rgb:255,216,77;
    --sky1:#0a0616; --sky2:#241033; --sky3:#3a1a52;
    --sun1:#ffe45e; --sun2:#ff7a2d; --sun2-rgb:255,122,45;
    --grid:#2f8bff; --grid-rgb:47,139,255;
    --glow:#39d9ff; --glow-rgb:57,217,255;
    --ink:#eef4ff; --ink-rgb:238,244,255;
    --gold:#ffd84d; --gold-rgb:255,216,77;
    --accent:#ff2d3b; --accent-rgb:255,45,59;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:transparent;overflow-x:hidden;font-family:'Orbitron',sans-serif;}
  body{padding:16px;}
  .orb{font-family:'Orbitron',sans-serif;}
  .ps{font-family:'Press Start 2P','Courier New',monospace;}

  @keyframes hueflicker{0%,100%{opacity:1}50%{opacity:.94}}
  @keyframes coinblink{0%,55%{opacity:1}56%,100%{opacity:.12}}
  @keyframes titlepulse{0%,100%{filter:drop-shadow(0 0 6px var(--g1)) drop-shadow(0 0 20px var(--g2))}50%{filter:drop-shadow(0 0 12px var(--g1)) drop-shadow(0 0 32px var(--g2))}}
  @keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(6px)}}
  @keyframes stardrift{0%{transform:translateY(0)}100%{transform:translateY(40px)}}
  @keyframes crtpulse{0%,100%{opacity:.9}50%{opacity:1}}
  @keyframes rowin{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:none}}

  .shell{width:100%;max-width:1320px;margin:0 auto;padding:clamp(16px,2.2vw,24px);
    background:linear-gradient(158deg,#14100C 0%,#0A0705 55%,#030201 100%);
    border-radius:clamp(34px,4.5vw,60px);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.055), inset 0 0 0 1px rgba(0,0,0,.55);}

  .stage{position:relative;width:100%;min-height:820px;margin:0 auto;overflow:hidden;
    border-radius:clamp(18px,3vw,40px);background:#050208;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);}

  .sky{position:absolute;inset:0 0 40% 0;background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 62%,var(--sky3) 100%);animation:hueflicker 8s ease-in-out infinite;}
  .stars{position:absolute;top:0;left:0;right:0;height:46%;background-size:520px 340px;animation:stardrift 26s linear infinite;opacity:.7;}
  .sun{position:absolute;top:14%;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;
    background:linear-gradient(180deg,var(--sun1) 0%,var(--sun2) 80%);box-shadow:0 0 70px rgba(var(--sun2-rgb),.45),0 0 130px rgba(var(--sun2-rgb),.25);overflow:hidden;opacity:.9;}
  .sun-bars{position:absolute;left:0;right:0;bottom:0;height:55%;background-image:repeating-linear-gradient(180deg,transparent 0,transparent 7px,rgba(0,0,0,.5) 7px,rgba(0,0,0,.5) 13px);}
  .floor{position:absolute;left:-20%;right:-20%;bottom:0;height:44%;background-color:#060012;
    background-image:linear-gradient(rgba(var(--grid-rgb),.75) 2px,transparent 2px),linear-gradient(90deg,rgba(var(--grid-rgb),.75) 2px,transparent 2px);
    background-size:80px 80px;transform:perspective(340px) rotateX(68deg);transform-origin:bottom;box-shadow:inset 0 40px 60px rgba(5,2,8,.95);}

  .content{position:relative;z-index:5;text-align:center;padding:clamp(28px,5vw,52px) clamp(24px,6vw,74px) 48px;}
  .eyebrow{font-weight:700;font-size:12px;letter-spacing:.5em;color:rgba(var(--glow-rgb),.9);text-shadow:0 0 10px rgba(var(--glow-rgb),.7);margin-bottom:12px;}
  .title{font-size:clamp(30px,6vw,56px);margin:0 0 12px;color:#fff;letter-spacing:.02em;line-height:1.1;
    background:linear-gradient(180deg,#fff 0%,var(--sun1) 40%,var(--g1) 78%,var(--g2) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:titlepulse 3.4s ease-in-out infinite;margin-bottom:26px;}

  .boards-row{display:flex;gap:26px;align-items:flex-start;justify-content:center;flex-wrap:wrap;}

  .board{padding:18px;border-radius:8px;background:rgba(8,3,18,.62);border:1px solid rgba(var(--glow-rgb),.28);
    box-shadow:0 0 30px rgba(var(--g1-rgb),.22), inset 0 0 30px rgba(var(--g2-rgb),.05);display:flex;flex-direction:column;gap:6px;}
  .board-challenge{flex:1 1 520px;max-width:620px;min-width:260px;}
  .board-title{font-size:13px;letter-spacing:.06em;margin-bottom:14px;text-align:center;}
  .board-title.challenge{color:var(--gold);text-shadow:0 0 12px rgba(var(--gold-rgb),.6);}
  .board-title.survival{color:var(--accent);text-shadow:0 0 12px rgba(var(--accent-rgb),.7);}

  .head-row{display:grid;grid-template-columns:44px 1fr 92px 92px;align-items:center;gap:10px;padding:0 16px 9px;
    border-bottom:1px solid rgba(var(--glow-rgb),.22);margin-bottom:9px;}
  .h{font-family:'Orbitron',sans-serif;font-weight:700;font-size:10px;letter-spacing:.18em;color:rgba(var(--ink-rgb),.5);}
  .h.r{text-align:right;}

  .rows{display:flex;flex-direction:column;gap:6px;}
  .row{display:grid;grid-template-columns:44px 1fr 92px 92px;align-items:center;gap:10px;padding:9px 16px;
    border:1px solid rgba(var(--glow-rgb),.18);background:rgba(10,5,24,.4);border-radius:3px;animation:rowin .3s ease both;}
  .row .rk,.row .who,.row .pts{font-family:'Press Start 2P','Courier New',monospace;font-size:13px;}
  .row .who{letter-spacing:.06em;}
  .row .pts{text-align:right;}
  .row .date{font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;letter-spacing:.04em;color:rgba(var(--ink-rgb),.55);text-align:right;}

  /* rank colouring */
  .row.lead{border:1px solid rgba(var(--gold-rgb),.5);background:linear-gradient(90deg,rgba(var(--gold-rgb),.12),rgba(0,0,0,.15));box-shadow:0 0 16px rgba(var(--gold-rgb),.28);}
  .row.lead .rk,.row.lead .who,.row.lead .pts{color:var(--gold);text-shadow:0 0 8px rgba(var(--gold-rgb),.7);}
  .row.rank2 .rk,.row.rank2 .who,.row.rank2 .pts{color:var(--ink);text-shadow:0 0 8px rgba(var(--ink-rgb),.5);}
  .row.rank3 .rk,.row.rank3 .who,.row.rank3 .pts{color:rgba(var(--glow-rgb),.95);text-shadow:0 0 8px rgba(var(--glow-rgb),.7);}
  .row.rankn .rk,.row.rankn .who,.row.rankn .pts{color:rgba(var(--ink-rgb),.82);text-shadow:0 0 8px rgba(var(--ink-rgb),.4);}

  .row-empty{padding:14px 16px;text-align:center;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:.12em;color:rgba(var(--ink-rgb),.45);}

  .right-col{position:relative;flex:1 1 320px;max-width:400px;min-width:260px;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .board-survival{width:100%;box-sizing:border-box;border:1px solid rgba(var(--accent-rgb),.4);box-shadow:0 0 30px rgba(var(--accent-rgb),.28), inset 0 0 30px rgba(var(--accent-rgb),.06);}
  .champ{width:170px;height:auto;filter:drop-shadow(0 0 18px rgba(var(--glow-rgb),.4)) drop-shadow(0 0 8px rgba(0,0,0,.6));pointer-events:none;}
  .champ-tag{font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;letter-spacing:.18em;color:rgba(var(--gold-rgb),.9);text-shadow:0 0 10px rgba(var(--gold-rgb),.6);margin-top:2px;text-align:center;max-width:280px;line-height:1.7;}

  .coin{display:inline-block;margin-top:22px;font-size:15px;color:var(--sun1);text-decoration:none;cursor:pointer;text-shadow:0 0 14px rgba(var(--sun2-rgb),.9);animation:coinblink 1.1s steps(1) infinite;position:relative;z-index:6;transition:filter .12s;}
  .coin:hover{filter:brightness(1.25);}
  .coin:focus-visible{outline:2px solid var(--sun1);outline-offset:4px;}

  .scanline{position:absolute;inset:0;z-index:20;pointer-events:none;
    background-image:repeating-linear-gradient(180deg,rgba(0,0,0,.24) 0,rgba(0,0,0,.24) 1px,transparent 1px,transparent 4px);animation:scan .35s steps(2) infinite;}
  .vignette{position:absolute;inset:0;z-index:21;pointer-events:none;background:radial-gradient(ellipse at 50% 42%,transparent 42%,rgba(4,1,9,.94) 100%);}
  .crt{position:absolute;inset:0;z-index:22;pointer-events:none;
    box-shadow:inset 0 0 90px rgba(0,0,0,.75), inset 0 0 60px rgba(var(--glow-rgb),.18), inset 0 0 170px rgba(var(--g1-rgb),.16);
    background:radial-gradient(ellipse at 50% 8%,rgba(255,255,255,.06),transparent 55%);animation:crtpulse 4s ease-in-out infinite;}
  .bloom{position:absolute;inset:0;z-index:23;pointer-events:none;border-radius:inherit;box-shadow:inset 0 0 5px rgba(255,255,255,.55), inset 0 0 30px rgba(var(--glow-rgb),.32);mix-blend-mode:screen;}
  .glass{position:absolute;inset:0;z-index:24;pointer-events:none;background:linear-gradient(125deg,rgba(255,255,255,.10) 0%,transparent 26%,transparent 100%);}

  .noscan .scanline{display:none;}

  @media (max-width:560px){
    .head-row,.row{grid-template-columns:34px 1fr 66px 64px;gap:6px;padding-left:10px;padding-right:10px;}
    .row .rk,.row .who,.row .pts{font-size:11px;}
    .champ{width:130px;}
  }
</style>
</head>
<body>
<div class="shell">
  <div class="stage" id="stage">
    <div class="sky"></div>
    <div class="stars" id="stars"></div>
    <div class="sun"><div class="sun-bars"></div></div>
    <div class="floor"></div>

<script>
(function(){
  "use strict";

  /* ---- config ---- */
  // Same shared Google Apps Script board the trainer reads/writes. Public read endpoint by design.
  const LEADERBOARD_URL = 'https://script.google.com/macros/s/AKfycbzrE-oWPWX9VLx5Tvl8hxNEYtXwsIwEXbrKd6rDtiuMQx6iC_V8Juy1vc-SZIPrr4um/exec';
  const BOARD_SIZES = { challenge:10, survival:3 };
  const REFRESH_MS = 45000;          // attract-mode poll
  const SURVIVAL_LABEL = 'SCORE';    // survival board shows the run score, same as challenge

  const params = new URLSearchParams(location.search);

  /* ---- palettes (ported from the Claude Design source) ---- */
  const PAL = {
    classic:  { g1:'#ff2d3b', g2:'#ffd84d', sky1:'#0a0616', sky2:'#241033', sky3:'#3a1a52', sun1:'#ffe45e', sun2:'#ff7a2d', grid:'#2f8bff', glow:'#39d9ff', ink:'#eef4ff', gold:'#ffd84d', accent:'#ff2d3b' },
    synthwave:{ g1:'#ff2d95', g2:'#00e5ff', sky1:'#2a0a4a', sky2:'#7a1f6b', sky3:'#ff5d6c', sun1:'#ffe45e', sun2:'#ff2d95', grid:'#ff2d95', glow:'#00e5ff', ink:'#fdeaff', gold:'#ffd84d', accent:'#ff2d95' },
    outrun:   { g1:'#ff6b1a', g2:'#ff1f6b', sky1:'#1a0636', sky2:'#5c1150', sky3:'#ff8a3d', sun1:'#fff06a', sun2:'#ff2f4e', grid:'#ff9d2f', glow:'#ff2f6e', ink:'#fff0e6', gold:'#ffd84d', accent:'#ff2f4e' }
  };
  const paletteName = PAL[params.get('palette')] ? params.get('palette') : 'classic';
  const C = PAL[paletteName];

  function triplet(hex){ hex = hex.replace('#',''); const n = parseInt(hex,16); return ((n>>16)&255)+','+((n>>8)&255)+','+(n&255); }
  (function applyPalette(){
    const r = document.documentElement.style;
    Object.keys(C).forEach(k=>{ r.setProperty('--'+k, C[k]); r.setProperty('--'+k+'-rgb', triplet(C[k])); });
  })();

  if(params.get('scanlines') === '0'){ document.getElementById('stage').classList.add('noscan'); }
  document.getElementById('survValHead').textContent = SURVIVAL_LABEL;

  /* ---- starfield (built from palette so stars match) ---- */
  (function stars(){
    const g = (x,y,c,s)=>'radial-gradient('+s+' '+s+' at '+x+' '+y+', '+c+', transparent)';
    const ink = 'rgba('+triplet(C.ink)+',0.9)', glow = 'rgba('+triplet(C.glow)+',0.9)';
    document.getElementById('stars').style.backgroundImage = [
      g('20%','30%','#fff','1px'), g('65%','12%',ink,'1px'), g('82%','40%','#fff','1.5px'),
      g('42%','18%',glow,'1px'), g('8%','52%','#fff','1px'), g('90%','22%','#fff','1.5px'), g('33%','8%',ink,'1px')
    ].join(', ');
  })();

  /* ---- demo fallback rows (from the design; used when the board is empty or blocked) ---- */
  const DEMO = {
    challenge: [
      ['1','DAV','2480','14\u00b707\u00b726'],['2','KAI','2210','12\u00b707\u00b726'],['3','MEG','1980','09\u00b707\u00b726'],
      ['4','JOZ','1840','11\u00b707\u00b726'],['5','ELI','1720','03\u00b707\u00b726'],['6','SAM','1600','28\u00b706\u00b726'],
      ['7','ROO','1490','22\u00b706\u00b726'],['8','TIA','1380','19\u00b706\u00b726'],['9','BEX','1270','15\u00b706\u00b726'],['10','ZED','1160','08\u00b706\u00b726']
    ],
    survival: [ ['1','DAV','1240','14\u00b707\u00b726'],['2','KAI','980','10\u00b707\u00b726'],['3','MEG','610','06\u00b707\u00b726'] ]
  };

  /* ---- board fetch: same fetch + JSONP fallback contract as the trainer ---- */
  function boardGet(board){
    if(!LEADERBOARD_URL) return Promise.resolve([]);
    return fetch(LEADERBOARD_URL+'?board='+board)
      .then(r=>r.json()).then(d=>(d&&d.scores)||[]).catch(()=>jsonpGet(board));
  }
  function jsonpGet(board){
    return new Promise(resolve=>{
      const cb='__lb'+Math.random().toString(36).slice(2);
      const s=document.createElement('script');
      const done=v=>{ try{delete window[cb];}catch(_){window[cb]=undefined;} s.remove(); resolve(v); };
      window[cb]=d=>done((d&&d.scores)||[]);
      s.onerror=()=>done([]); s.src=LEADERBOARD_URL+'?board='+board+'&callback='+cb;
      document.head.appendChild(s);
      setTimeout(()=>{ if(window[cb]) done([]); },6000);
    });
  }

  /* ---- helpers ---- */
  function pad2(n){ n=String(n); return n.length<2 ? '0'+n : n; }
  function fmtDate(v){
    if(!v) return '';
    // already formatted "DD.MM.YY" style
    if(typeof v==='string' && /\d{1,2}[.\u00b7\/-]\d{1,2}[.\u00b7\/-]\d{2,4}/.test(v)) return v.replace(/[.\/-]/g,'\u00b7');
    const d = new Date(v);
    if(isNaN(d)) return (typeof v==='string') ? v : '';
    return pad2(d.getDate())+'\u00b7'+pad2(d.getMonth()+1)+'\u00b7'+String(d.getFullYear()).slice(-2);
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Normalise a live row (object or array) into [rank, who, pts, date]
  function normalise(row, i, board){
    if(Array.isArray(row)){
      return [ row[0]!=null?row[0]:String(i+1), row[1]||'---', row[2]!=null?row[2]:'', fmtDate(row[3]) ];
    }
    const who = row.initials || row.name || row.who || '---';
    const pts = row.score != null ? row.score : (row.pts != null ? row.pts : '');
    // date shown is the date portion of whatever timestamp the board returns
    const date = fmtDate(row.date || row.ts || row.timestamp || row.time || row.when || '');
    return [ String(i+1), who, pts, date ];
  }

  function rankClass(i){ return i===0?'row lead':i===1?'row rank2':i===2?'row rank3':'row rankn'; }

  function render(elId, rows, board){
    const el = document.getElementById(elId);
    const size = BOARD_SIZES[board];
    const list = rows.slice(0, size);
    if(!list.length){ el.innerHTML = '<div class="row-empty">NO SCORES YET &mdash; BE THE FIRST</div>'; return; }
    el.innerHTML = list.map((raw,i)=>{
      const [rank,who,pts,date] = normalise(raw,i,board);
      return '<div class="'+rankClass(i)+'" style="animation-delay:'+(i*40)+'ms">'
        + '<span class="rk">'+esc(pad2(rank))+'</span>'
        + '<span class="who">'+esc(who)+'</span>'
        + '<span class="pts">'+esc(pts)+'</span>'
        + '<span class="date">'+esc(date)+'</span>'
        + '</div>';
    }).join('');
  }

  async function load(){
    let ch=[], sv=[];
    try{ ch = await boardGet('challenge'); }catch(e){ ch=[]; }
    try{ sv = await boardGet('survival');  }catch(e){ sv=[]; }
    render('challengeRows', ch.length ? ch : DEMO.challenge, 'challenge');
    render('survivalRows',  sv.length ? sv : DEMO.survival,  'survival');
  }

  load();
  setInterval(load, REFRESH_MS);
})();
</script>
</body>
</html>
