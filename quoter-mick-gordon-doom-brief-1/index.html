<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Quoter: Mick Gordon, The Doom Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E1A17;
    --text: #EAE0D0;
    --text-dim: rgba(234, 224, 208, 0.62);
    --text-faint: rgba(234, 224, 208, 0.34);
    --accent: #C07838;
    --accent-glow: #D8904A;
    --border: rgba(234, 224, 208, 0.15);
    --border-bright: rgba(234, 224, 208, 0.35);
    /* lifted control tones: tracks and outlines on the transport row */
    --control: rgba(234, 224, 208, 0.34);
    --control-bright: rgba(234, 224, 208, 0.52);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;   /* lets the frame float on the Canvas page */
    -webkit-font-smoothing: antialiased;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    padding: 12px;
  }

  /* ─── FLOATING FRAME ─── */
  .frame {
    background: var(--bg);
    border-radius: 12px;
    padding: 20px 22px;
    max-width: 840px;
    margin: 0 auto;
  }

  .main {
    display: flex;
    gap: 22px;
    align-items: flex-start;
    justify-content: center;
  }

  .col-video {
    flex: 1 1 460px;
    min-width: 0;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ─── VIDEO STAGE ─── */
  .video-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #000;
    overflow: hidden;
  }

  .video-stage iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    z-index: 1;
  }

  /* transparent shield: swallows every mouse event so YouTube never
     registers a hover or click. no hover = no title bar, no logo,
     no end-screen. always present. */
  .click-shield {
    position: absolute;
    inset: 0;
    z-index: 2;
    cursor: default;
  }

  /* ─── TITLE CARD / CURTAIN ─── */
  /* one element doing three jobs: idle title card, curtain that hides
     YouTube's start-up overlay flash, and the fade-to-black at the end. */
  .cover {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16120F;
    opacity: 1;
    transition: opacity 0.8s ease;
  }
  .cover.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 0 26px;
    text-align: center;
  }

  .card-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .card-title {
    font-size: 15px;
    line-height: 1.4;
    color: var(--text);
    letter-spacing: 0.01em;
    max-width: 380px;
  }

  .card-meta {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .card-meta a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
    transition: color 0.12s, border-color 0.12s;
  }
  .card-meta a:hover {
    color: var(--accent-glow);
    border-bottom-color: var(--accent-glow);
  }

  .card-len {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
  }

  /* PLAY / REPLAY. opacity (not display) so hiding it never reflows
     the card and shunts the text around. */
  .big-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--control-bright);
    padding: 12px 24px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 11px;
    transition: background 0.1s, color 0.1s, border-color 0.1s, opacity 0.25s ease;
  }
  .big-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .big-btn .tri {
    display: inline-block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 6px 0 6px 11px;
    border-color: transparent transparent transparent currentColor;
  }
  .big-btn.replay .tri {
    border: none;
    width: auto; height: auto;
    font-size: 14px;
    line-height: 1;
  }

  /* curtain mode: playing behind the card. button gone, text stays put. */
  .cover.curtain .big-btn {
    opacity: 0;
    pointer-events: none;
  }
  .cover.curtain .card-meta a { pointer-events: none; }

  .cover-msg {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-align: center;
    padding: 0 24px;
    line-height: 1.5;
  }

  /* ─── TRANSPORT ─── */
  .transport {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
  }

  .stop-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--control);
    border-radius: 3px;
    padding: 9px 16px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.08s, color 0.08s;
  }
  .stop-btn:hover:not(:disabled) { border-color: var(--control-bright); }
  .stop-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* non-interactive progress readout (NOT a scrubber) */
  .progress {
    flex: 1;
    height: 3px;
    background: var(--control);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    pointer-events: none;
    min-width: 40px;
  }
  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--accent);
    transition: width 0.1s linear;
  }

  /* ─── VOLUME ─── */
  .volume {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .vol-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    color: rgba(234, 224, 208, 0.75);
    text-transform: uppercase;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    padding: 2px 0;
    transition: color 0.08s;
  }
  .vol-label:hover { color: var(--text); }
  .vol-label.muted { color: var(--accent); }

  input[type="range"].vol {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 3px;
    background: var(--control);
    border-radius: 2px;
    cursor: pointer;
    outline: none;
  }
  input[type="range"].vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 6px;
    height: 16px;
    background: var(--accent);
    border: none;
    border-radius: 0;
    box-shadow: inset 0 0 0 1px var(--bg);
  }
  input[type="range"].vol::-moz-range-thumb {
    width: 6px;
    height: 16px;
    background: var(--accent);
    border: none;
    border-radius: 0;
    box-shadow: inset 0 0 0 1px var(--bg);
  }
  input[type="range"].vol::-moz-range-track {
    height: 3px;
    background: var(--control);
    border-radius: 2px;
  }

  /* ─── NOTES PANEL ─── */
  .notes {
    flex: 0 1 258px;
    min-width: 0;
    border-left: 1px solid var(--border);
    padding-left: 20px;
    align-self: stretch;
  }

  .notes-label {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .notes-body p {
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text-dim);
    margin-bottom: 11px;
  }
  .notes-body p:last-child { margin-bottom: 0; }
  .notes-body em {
    font-style: italic;
    color: var(--text);
  }
  .notes-body .listen {
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 11px;
    margin-top: 13px;
  }

  /* stack on narrow columns */
  @media (max-width: 660px) {
    .main { flex-direction: column; gap: 16px; align-items: center; }
    .col-video { flex: 0 0 auto; width: 100%; max-width: 500px; }
    .notes {
      flex: 0 0 auto;
      width: 100%;
      max-width: 500px;
      align-self: auto;
      border-left: none;
      border-top: 1px solid var(--border);
      padding-left: 0;
      padding-top: 16px;
    }
    .frame { padding: 16px; }
    body { padding: 8px; }
    input[type="range"].vol { width: 58px; }
    .stop-btn { padding: 9px 12px; }
    .card-title { font-size: 13px; }
  }
</style>
</head>
<body>

  <div class="frame">
    <div class="main">

      <div class="col-video">
        <div class="video-stage">
          <div id="player"></div>
          <div class="click-shield"></div>
          <div class="cover" id="cover">
            <div class="card">
              <div class="card-text">
                <div class="card-title" id="cardTitle"></div>
                <div class="card-meta" id="cardMeta"></div>
                <div class="card-len" id="cardLen"></div>
              </div>
              <button class="big-btn" id="coverBtn"><span class="tri"></span><span id="coverLabel">PLAY</span></button>
              <div class="cover-msg" id="coverMsg" style="display:none;"></div>
            </div>
          </div>
        </div>

        <div class="transport">
          <button class="stop-btn" id="stopBtn" disabled>Stop</button>
          <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
          <div class="volume">
            <button class="vol-label" id="muteBtn">Vol</button>
            <input type="range" class="vol" id="volSlider" min="0" max="100" value="50" aria-label="Volume">
          </div>
        </div>
      </div>

      <!-- ═══ NOTES: edit this prose directly. ═══ -->
      <aside class="notes">
        <div class="notes-label">Notes</div>
        <div class="notes-body">
          <p>In this video Mick Gordon discusses the brief he received from id Software about composing the score for Doom.</p>
        </div>
      </aside>
      <!-- ═══════════════════════════════════════════════════════════════ -->

    </div>
  </div>

<script>
  // ══════════════════════════════════════════════════════════════
  //  CONFIG — one quote per MOTE. Duplicate the folder, change these.
  //  (Notes prose lives in the markup above, not here.)
  // ══════════════════════════════════════════════════════════════
  const QUOTE = {
    videoId: 'U4FNBMZsqrY',   // GDC 2017, DOOM: Behind the Music
    start: 153,               // 2:33 — quote content start (s)
    end: 252,                 // 4:12 — quote content end (s)
    fadeIn: 3,                // seconds of audio fade-in BEFORE start (0 = hard cut)
    fadeOut: 3,               // seconds of audio fade-out AFTER end   (0 = hard cut)
    title: 'Mick Gordon discussing the Doom brief',
    source: 'GDC Festival of Gaming',   // credit on the card ('' to hide)
    sourceUrl: '',            // '' = auto-link to this video on YouTube
    showLength: true,         // show the quote length on the card
    levelTrim: -6,            // per-clip dB trim, set by ear. STARTING GUESS. YouTube
                              // only normalises loud content DOWN, never quiet
                              // content up, so levels still vary between clips.
    fadeCurve: 2              // 1 = linear (abrupt), 2 = smooth, 3 = very gradual
  };
  // ══════════════════════════════════════════════════════════════

  // played window extends either side to carry the audio fades
  const PLAY_START = Math.max(0, QUOTE.start - (QUOTE.fadeIn || 0));
  const PLAY_END   = QUOTE.end + (QUOTE.fadeOut || 0);

  // how long the title card is held over the video after play, to cover
  // YouTube's start-up overlay flash. bump if any of it still peeks through.
  const REVEAL_HOLD     = 4.2;
  const REVEAL_AT       = PLAY_START + Math.max(QUOTE.fadeIn || 0, REVEAL_HOLD);
  const REVEAL_DISSOLVE = 0.8;   // seconds, card dissolving away into the video

  // the card fades back in across the audio fade-out, so the end mirrors
  // the start. minimum 0.6s so a hard-cut clip still lands softly.
  const END_FADE = Math.max(QUOTE.fadeOut || 0, 0.6);

  // per-clip level trim, dB -> linear multiplier
  const TRIM = Math.pow(10, (QUOTE.levelTrim || 0) / 20);

  // Fades must be curved, not linear. Perceived loudness tracks roughly
  // amplitude^0.6, so a linear amplitude ramp holds near full loudness for
  // most of its length then collapses at the end, which reads as a cut
  // rather than a fade. Raising the ramp to a power spreads the change
  // evenly across the fade.
  function fadeGain(x) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    return Math.pow(x, QUOTE.fadeCurve || 2);
  }

  // single place that talks to the player's volume: slider x envelope x trim
  function pushVolume(envGain) {
    const v = (+$vol.value || 0) * envGain * TRIM;
    safe(() => player.setVolume(Math.max(0, Math.min(100, Math.round(v)))));
  }

  // YouTube can load captions regardless of cc_load_policy (account
  // preference, or the video defaulting them on), so unload the module
  // outright. 'captions' is the HTML5 name, 'cc' the legacy one.
  function killCaptions() {
    safe(() => player.unloadModule('captions'));
    safe(() => player.unloadModule('cc'));
  }

  // ─── DOM ───
  const $cover     = document.getElementById('cover');
  const $coverBtn  = document.getElementById('coverBtn');
  const $coverLabel= document.getElementById('coverLabel');
  const $coverTri  = $coverBtn.querySelector('.tri');
  const $coverMsg  = document.getElementById('coverMsg');
  const $cardTitle = document.getElementById('cardTitle');
  const $cardMeta  = document.getElementById('cardMeta');
  const $cardLen   = document.getElementById('cardLen');
  const $stopBtn   = document.getElementById('stopBtn');
  const $progress  = document.getElementById('progressFill');
  const $muteBtn   = document.getElementById('muteBtn');
  const $vol       = document.getElementById('volSlider');

  function fmtLen(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.round(sec % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  // ─── POPULATE CARD ───
  $cardTitle.textContent = QUOTE.title;

  if (QUOTE.source) {
    const a = document.createElement('a');
    a.textContent = QUOTE.source;
    a.href = QUOTE.sourceUrl || ('https://www.youtube.com/watch?v=' + QUOTE.videoId);
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.title = 'Open the source video on YouTube in a new tab';
    $cardMeta.appendChild(a);
  } else {
    $cardMeta.style.display = 'none';
  }

  if (QUOTE.showLength) {
    $cardLen.textContent = fmtLen(QUOTE.end - QUOTE.start);
  } else {
    $cardLen.style.display = 'none';
  }

  // ─── STATE ───
  let player = null;
  let ready = false;
  let hasPlayed = false;
  let curtainDropped = false;
  let endFadeStarted = false;
  let poll = null;
  let lastVol = 50;
  let envGain = 1;          // current fade-envelope gain, 0..1

  // ─── YOUTUBE API BOOTSTRAP ───
  (function () {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: QUOTE.videoId,
      playerVars: {
        controls: 0,          // no YouTube control bar
        disablekb: 1,         // no YouTube keyboard shortcuts
        rel: 0,               // no related-video spray
        fs: 0,                // no fullscreen button
        iv_load_policy: 3,    // no annotations
        modestbranding: 1,    // reduced branding
        playsinline: 1,       // no forced fullscreen on iOS
        cc_load_policy: 0,
        start: PLAY_START,
        // deliberately past our own end: YouTube's segment stop is
        // imprecise and would otherwise truncate the fade-out. this is
        // only a backstop; the poll below owns the real ending.
        end: Math.ceil(PLAY_END) + 2
      },
      events: {
        onReady: onReady,
        onStateChange: onStateChange,
        onError: onError
      }
    });
  }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  function onReady() {
    ready = true;
    pushVolume(1);
    killCaptions();
    // captions can attach late, so sweep again shortly after
    setTimeout(killCaptions, 800);
    setTimeout(killCaptions, 2500);
    safe(() => player.cueVideoById({
      videoId: QUOTE.videoId,
      startSeconds: PLAY_START,
      endSeconds: Math.ceil(PLAY_END) + 2
    }));
  }

  function onError() {
    ready = false;
    $coverBtn.style.display = 'none';
    $cardLen.style.display = 'none';
    $coverMsg.style.display = '';
    $coverMsg.textContent = 'This clip could not be loaded. The video may have embedding disabled.';
    $stopBtn.disabled = true;
  }

  function onStateChange(e) {
    if (e.data === YT.PlayerState.PLAYING) { killCaptions(); startPoll(); }
    else if (e.data === YT.PlayerState.ENDED) finishClip();
  }

  // ─── COVER / CARD STATES ───
  // instant, no transition: used when snapping state without a fade
  function setCoverInstant(fn) {
    $cover.style.transitionDuration = '0s';
    fn();
    void $cover.offsetWidth;            // commit before transitions return
    $cover.style.transitionDuration = '';
  }

  // play pressed: card stays put, button fades out, video runs behind
  function enterCurtain() {
    setCoverInstant(() => {
      $cover.classList.add('curtain');
      $cover.classList.remove('hidden');
    });
  }

  // dissolve the card away to reveal the playing video
  function revealVideo() {
    $cover.style.transitionDuration = REVEAL_DISSOLVE + 's';
    $cover.classList.add('hidden');
  }

  // fade back to the card across the audio fade-out, button returning with it
  function beginEndFade() {
    $cover.classList.remove('curtain');
    setLabel();
    $cover.style.transitionDuration = END_FADE + 's';
    $cover.classList.remove('hidden');
  }

  // snap straight back to the card (stop pressed, or init)
  function showCoverInstant() {
    setLabel();
    setCoverInstant(() => {
      $cover.classList.remove('curtain');
      $cover.classList.remove('hidden');
    });
  }

  function setLabel() {
    $coverLabel.textContent = hasPlayed ? 'REPLAY' : 'PLAY';
    if (hasPlayed) {
      $coverBtn.classList.add('replay');
      $coverTri.textContent = '↻';
    }
  }

  // ─── TRANSPORT ───
  function playClip() {
    if (!ready) return;
    hasPlayed = true;
    curtainDropped = false;
    endFadeStarted = false;
    enterCurtain();
    envGain = 0;
    $stopBtn.disabled = false;
    safe(() => { player.setVolume(0); player.seekTo(PLAY_START, true); player.playVideo(); });
    killCaptions();
  }

  function stopClip() {
    stopPoll();
    safe(() => { player.pauseVideo(); player.seekTo(PLAY_START, true); });
    $progress.style.width = '0%';
    $stopBtn.disabled = true;
    envGain = 1;
    showCoverInstant();
  }

  function finishClip() {
    stopPoll();
    safe(() => { player.pauseVideo(); player.seekTo(PLAY_START, true); });
    $progress.style.width = '0%';
    $stopBtn.disabled = true;
    // the card has already faded back in across the fade-out, so only
    // snap it if playback ended some other way
    if (!endFadeStarted) showCoverInstant();
    else setLabel();
  }

  function startPoll() {
    stopPoll();
    poll = setInterval(() => {
      if (!ready) return;
      const t = safeGet(() => player.getCurrentTime(), PLAY_START);

      // audio envelope: up across the fade-in, hold through the quote,
      // down across the fade-out
      let factor = 1;
      if (QUOTE.fadeIn && t < QUOTE.start) {
        factor = (t - PLAY_START) / QUOTE.fadeIn;
      } else if (QUOTE.fadeOut && t > QUOTE.end) {
        factor = 1 - (t - QUOTE.end) / QUOTE.fadeOut;
      }
      factor = Math.max(0, Math.min(1, factor));
      if (factor < 0.02) factor = 0;      // land on true silence, not a stub
      envGain = fadeGain(factor);
      pushVolume(envGain);

      // progress spans the played window, fade tails included
      const frac = (t - PLAY_START) / (PLAY_END - PLAY_START);
      $progress.style.width = Math.max(0, Math.min(1, frac)) * 100 + '%';

      // drop the curtain once YouTube's start-up overlay has cleared
      if (!curtainDropped && t >= REVEAL_AT) {
        curtainDropped = true;
        revealVideo();
      }

      // fade back to the card in step with the audio fade-out
      if (!endFadeStarted && t >= QUOTE.end - (END_FADE - (QUOTE.fadeOut || 0))) {
        endFadeStarted = true;
        beginEndFade();
      }

      if (t >= PLAY_END) finishClip();
    }, 50);
  }
  function stopPoll() { if (poll) { clearInterval(poll); poll = null; } }

  // ─── VOLUME ───
  function applyVolume(v) {
    // respect the fade envelope, so moving the slider mid-fade does not
    // punch the level back up to full
    pushVolume(envGain);
    if (v === 0) {
      safe(() => player.mute());
      $muteBtn.classList.add('muted');
      $muteBtn.textContent = 'Muted';
    } else {
      safe(() => player.unMute());
      $muteBtn.classList.remove('muted');
      $muteBtn.textContent = 'Vol';
    }
  }

  $vol.addEventListener('input', () => {
    const v = +$vol.value || 0;
    if (v > 0) lastVol = v;
    applyVolume(v);
  });

  $muteBtn.addEventListener('click', () => {
    if (+$vol.value === 0) { $vol.value = lastVol || 50; applyVolume(+$vol.value); }
    else { lastVol = +$vol.value; $vol.value = 0; applyVolume(0); }
  });

  // ─── WIRE ───
  $coverBtn.addEventListener('click', playClip);
  $stopBtn.addEventListener('click', stopClip);

  function safe(fn) { try { fn(); } catch (e) {} }
  function safeGet(fn, fallback) { try { return fn(); } catch (e) { return fallback; } }
</script>
</body>
</html>
