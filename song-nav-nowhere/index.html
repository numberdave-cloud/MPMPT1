<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Structure Navigator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E1A17;
    --text: #EAE0D0;
    --text-dim: rgba(234, 224, 208, 0.55);
    --text-faint: rgba(234, 224, 208, 0.3);
    --accent: #C07838;
    --accent-glow: #D8904A;
    --border: rgba(234, 224, 208, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow: hidden;
  }

  body {
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 900px;
  }

  /* ─── PLAYER ───────────────────────────────────────────────── */
  .player-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;   /* 16:9 */
    background: #000;
    border: 1px solid var(--border);
    border-bottom: none;
    overflow: hidden;
  }
  .player-wrap iframe,
  .player-wrap #player {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .player-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* ─── SECTION BLOCKS ───────────────────────────────────────── */
  .sections-row {
    display: flex;
    width: 100%;
    border: 1px solid var(--border);
    background: var(--bg);
  }

  .section-block {
    flex: 1;
    min-width: 0;
    height: 76px;
    border: none;
    border-right: 1px solid rgba(30, 26, 23, 0.45);
    background: transparent;
    color: var(--bg);
    font-family: inherit;
    cursor: pointer;
    padding: 8px 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    position: relative;
    transition: filter 0.1s ease, box-shadow 0.18s ease;
  }
  .section-block:last-child { border-right: none; }
  .section-block:hover { filter: brightness(1.12); }
  .section-block:focus-visible {
    outline: 2px solid var(--text);
    outline-offset: -4px;
  }
  .section-block.active {
    overflow: visible;
    box-shadow:
      inset 0 0 0 2px rgba(234, 224, 208, 0.9),
      0 0 16px rgba(234, 224, 208, 0.45);
    z-index: 2;
  }

  .bars-label {
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--bg);
    opacity: 1;
    transition: opacity 0.18s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .type-label {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg);
    border: 1px solid var(--text);
    color: var(--text);
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 3;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
  }

  .section-block.active .bars-label { opacity: 0; }
  .section-block.active .type-label  { opacity: 1; }

  /* ─── RESPONSIVE ───────────────────────────────────────────── */
  @media (max-width: 600px) {
    body { padding: 10px; }
    .section-block { height: 62px; padding: 6px 3px; }
    .bars-label { font-size: 11px; }
    .type-label { font-size: 10px; letter-spacing: 0.14em; padding: 5px 10px; }
  }
  @media (max-width: 400px) {
    .section-block { height: 56px; }
    .bars-label { font-size: 10px; }
    .type-label { font-size: 9px; letter-spacing: 0.1em; padding: 4px 8px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="player-wrap">
      <div class="player-loading">Loading…</div>
      <div id="player"></div>
    </div>
    <div class="sections-row" id="sectionsRow"></div>
  </div>

<script>
  /* ─── PLAYBACK ATTENUATION ────────────────────────────────────
     YouTube embeds come through hot. We pin the player to ~-6 dB
     so lessons don't blow students' ears off. 50 on the 0-100 scale
     ≈ -6 dB. Adjust if a specific lesson needs louder/quieter.
  */
  const DEFAULT_VOLUME = 50;

  /* ─── CONFIG ───────────────────────────────────────────────────
     This is the only block to edit when adapting the template to
     a new song. Replace videoId, sections, and bar counts.
     -----------------------------------------------------------
     section.type controls the colour and uses the same vocabulary
     as the structure-analyser MOTE. Supported types:
       intro, verse, pre-chorus, chorus, post-chorus, bridge,
       solo, outro, hook, pre-hook, break, build, drop, groove,
       breakdown, fake-drop

     section.bars is the bar count shown inside the block. Optional
     — leave undefined and the block will just be a coloured stripe.
  */
  const CONFIG = {
    videoId: '5z5HJRC9F_0',
    title: 'Therapy?, "Nowhere"',
    sections: [
      { name: 'Intro',        type: 'intro',      start: 0,   end: 15,  bars: 12   },
      { name: 'Verse 1',      type: 'verse',      start: 15,  end: 25,  bars: 8    },
      { name: 'Pre-Chorus 1', type: 'pre-chorus', start: 25,  end: 35,  bars: 8    },
      { name: 'Chorus 1',     type: 'chorus',     start: 35,  end: 45,  bars: 8    },
      { name: 'Verse 2',      type: 'verse',      start: 45,  end: 55,  bars: 8    },
      { name: 'Pre-Chorus 2', type: 'pre-chorus', start: 55,  end: 65,  bars: 8    },
      { name: 'Chorus 2',     type: 'chorus',     start: 65,  end: 75,  bars: 8    },
      { name: 'Bridge',       type: 'bridge',     start: 75,  end: 96,  bars: 16   },
      { name: 'Solo',         type: 'solo',       start: 96,  end: 106, bars: 8    },
      { name: 'Pre-Chorus 3', type: 'pre-chorus', start: 106, end: 117, bars: 8    },
      { name: 'Chorus 3',     type: 'chorus',     start: 117, end: 138, bars: 16   },
      { name: 'Outro',        type: 'outro',      start: 138, end: 146, bars: null }  // chords ring out
    ]
  };

  /* ─── TYPE → COLOUR ────────────────────────────────────────────
     Matches the structure-analyser MOTE palette so colour code
     vocabulary carries between the two widgets.
  */
  const TYPE_COLORS = {
    'intro':       '#8FA37E',  // sage
    'verse':       '#C07838',  // terracotta
    'pre-chorus':  '#C8A04A',  // mustard
    'chorus':      '#B85542',  // warm red
    'post-chorus': '#B07878',  // dusty pink
    'bridge':      '#8B6A8B',  // mauve
    'solo':        '#8A8540',  // olive
    'outro':       '#8A7A6A',  // warm grey
    'hook':        '#B85542',  // hip-hop: same as chorus
    'pre-hook':    '#C8A04A',  // hip-hop: same as pre-chorus
    'break':       '#5C8A8A',  // teal
    'build':       '#C8A04A',  // electronic: mustard
    'drop':        '#B85542',  // electronic: warm red
    'groove':      '#C07838',  // electronic: terracotta
    'breakdown':   '#5C8A8A',  // electronic: teal
    'fake-drop':   '#8B6A8B'   // electronic: mauve
  };

  /* ─── TYPE → DISPLAY LABEL ────────────────────────────────────
     What gets shown in the floating active-block label. Stripped
     of numbering (so "VERSE", not "VERSE 1") because the label is
     about WHAT, not WHICH ONE.
  */
  const TYPE_LABELS = {
    'intro':       'INTRO',
    'verse':       'VERSE',
    'pre-chorus':  'PRE-CHORUS',
    'chorus':      'CHORUS',
    'post-chorus': 'POST-CHORUS',
    'bridge':      'BRIDGE',
    'solo':        'SOLO',
    'outro':       'OUTRO',
    'hook':        'HOOK',
    'pre-hook':    'PRE-HOOK',
    'break':       'BREAK',
    'build':       'BUILD',
    'drop':        'DROP',
    'groove':      'GROOVE',
    'breakdown':   'BREAKDOWN',
    'fake-drop':   'FAKE DROP'
  };

  /* ─── STATE ──────────────────────────────────────────────────── */
  let player;
  let pollHandle = null;
  let currentActiveIdx = -1;

  /* ─── YOUTUBE IFRAME API ─────────────────────────────────────── */
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player('player', {
      host: 'https://www.youtube-nocookie.com',
      videoId: CONFIG.videoId,
      playerVars: {
        autoplay: 0,
        rel: 0,
        modestbranding: 1,
        playsinline: 1
      },
      events: {
        onReady: onPlayerReady,
        onStateChange: onPlayerStateChange
      }
    });
  };

  function onPlayerReady() {
    const loading = document.querySelector('.player-loading');
    if (loading) loading.remove();
    renderSections();
    if (player.setVolume) player.setVolume(DEFAULT_VOLUME);
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
      startPolling();
    } else if (event.data === YT.PlayerState.PAUSED ||
               event.data === YT.PlayerState.ENDED ||
               event.data === YT.PlayerState.BUFFERING) {
      stopPolling();
    }
  }

  function startPolling() {
    if (pollHandle) return;
    pollHandle = setInterval(updateActive, 200);
    updateActive();
  }

  function stopPolling() {
    if (pollHandle) {
      clearInterval(pollHandle);
      pollHandle = null;
    }
  }

  function updateActive() {
    if (!player || !player.getCurrentTime) return;
    const t = player.getCurrentTime();
    let idx = -1;
    for (let i = 0; i < CONFIG.sections.length; i++) {
      const s = CONFIG.sections[i];
      if (t >= s.start && t < s.end) { idx = i; break; }
    }
    if (idx !== currentActiveIdx) {
      currentActiveIdx = idx;
      applyActiveClass();
    }
  }

  /* ─── RENDERING ──────────────────────────────────────────────── */
  function renderSections() {
    const row = document.getElementById('sectionsRow');
    row.innerHTML = '';
    const totalDuration = CONFIG.sections.reduce(
      (sum, s) => sum + (s.end - s.start), 0
    );

    CONFIG.sections.forEach((section, idx) => {
      const block = document.createElement('button');
      block.className = 'section-block';
      block.dataset.idx = idx;
      block.style.flex = String((section.end - section.start) / totalDuration);
      block.style.background = TYPE_COLORS[section.type] || '#888';
      block.setAttribute('aria-label',
        section.name + ', starts at ' + formatTime(section.start));

      // Bar count (shown when not active)
      const barsEl = document.createElement('div');
      barsEl.className = 'bars-label';
      if (typeof section.bars === 'number' && section.bars > 0) {
        barsEl.textContent = section.bars + ' BAR' + (section.bars === 1 ? '' : 'S');
      } else {
        barsEl.textContent = '';
      }
      block.appendChild(barsEl);

      // Type label (shown when active, hovers centred over the block)
      const typeEl = document.createElement('div');
      typeEl.className = 'type-label';
      typeEl.textContent = TYPE_LABELS[section.type] || section.type.toUpperCase();
      block.appendChild(typeEl);

      block.addEventListener('click', () => seekToSection(idx));
      row.appendChild(block);
    });
  }

  function applyActiveClass() {
    document.querySelectorAll('.section-block').forEach((el, idx) => {
      el.classList.toggle('active', idx === currentActiveIdx);
    });
  }

  /* ─── HELPERS ────────────────────────────────────────────────── */
  function seekToSection(idx) {
    const section = CONFIG.sections[idx];
    if (!player || !section || !player.seekTo) return;
    player.seekTo(section.start, true);
    player.playVideo();
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }
</script>
</body>
</html>
