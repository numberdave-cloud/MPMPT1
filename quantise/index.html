<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantisation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E1A17;
    --fg: #EAE0D0;
    --fg-dim: rgba(234, 224, 208, 0.5);
    --fg-faint: rgba(234, 224, 208, 0.18);
    --accent: #C07838;
    --accent-glow: #D8904A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    min-height: 100vh;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
  }
  .header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 12px;
    color: var(--fg-dim);
    letter-spacing: 0.02em;
  }

  /* Layout: two columns. Column 1 = lane labels. Column 2 = beat numbers (row 1)
     + drawing area (row 2). aspect-ratio on the drawing cell governs height. */
  .stage {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 84px 1fr;
    grid-template-rows: auto auto;
    column-gap: 0;
  }
  .beat-row {
    grid-column: 2;
    grid-row: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    margin-bottom: 6px;
  }
  .beat-cell {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: var(--fg-dim);
  }
  .beat-cell span {
    text-align: left;
    padding-left: 2px;
  }
  .beat-cell span.beat {
    color: var(--fg);
    font-weight: 700;
  }
  .lane-col {
    grid-column: 1;
    grid-row: 2;
    display: grid;
    grid-template-rows: repeat(4, 1fr);
    border-right: 1px solid var(--fg-faint);
  }
  .lane-label {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .grid-cell {
    grid-column: 2;
    grid-row: 2;
    aspect-ratio: 920 / 240;
    width: 100%;
    min-width: 0;
  }
  .grid-cell svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .controls {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
  }
  .slider-block {
    flex: 1;
    min-width: 260px;
  }
  .slider-label {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    margin-bottom: 8px;
    letter-spacing: 0.06em;
  }
  .slider-label .value {
    color: var(--accent-glow);
  }
  .slider-track {
    position: relative;
    height: 26px;
    cursor: pointer;
    user-select: none;
    touch-action: none;
  }
  .slider-track-line {
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 1px;
    background: var(--fg-faint);
    transform: translateY(-0.5px);
  }
  .slider-track-fill {
    position: absolute;
    left: 0; top: 50%;
    height: 1px;
    background: var(--accent);
    transform: translateY(-0.5px);
    width: 0%;
    pointer-events: none;
  }
  .slider-handle {
    position: absolute;
    top: 50%;
    width: 10px;
    height: 22px;
    background: var(--fg);
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: background-color 0.12s;
  }
  .slider-handle::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--bg);
    transform: translateX(-0.5px);
  }
  .slider-track:hover .slider-handle,
  .slider-track.dragging .slider-handle {
    background: var(--accent-glow);
  }
  .play-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg);
    background: transparent;
    border: 1px solid var(--fg);
    padding: 10px 22px;
    cursor: pointer;
    transition: background-color 0.12s, color 0.12s, border-color 0.12s;
    min-width: 110px;
  }
  .play-btn:hover {
    border-color: var(--accent-glow);
    color: var(--accent-glow);
  }
  .play-btn:disabled {
    opacity: 0.5;
    cursor: wait;
  }
  .play-btn.playing {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .play-btn.playing:hover {
    background: var(--accent-glow);
    border-color: var(--accent-glow);
  }
</style>
</head>
<body>
  <div class="header">
    <div class="title">Quantisation</div>
  </div>

  <div class="stage">
    <div class="beat-row">
      <div class="beat-cell"><span class="beat">1</span><span>e</span><span>+</span><span>a</span></div>
      <div class="beat-cell"><span class="beat">2</span><span>e</span><span>+</span><span>a</span></div>
      <div class="beat-cell"><span class="beat">3</span><span>e</span><span>+</span><span>a</span></div>
      <div class="beat-cell"><span class="beat">4</span><span>e</span><span>+</span><span>a</span></div>
    </div>
    <div class="lane-col">
      <div class="lane-label">KICK</div>
      <div class="lane-label">SNARE</div>
      <div class="lane-label">HAT</div>
      <div class="lane-label">COWBELL</div>
    </div>
    <div class="grid-cell">
      <svg id="grid-svg" viewBox="0 0 920 240" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <div class="controls">
    <button class="play-btn" id="play-btn">▶ PLAY</button>
    <div class="slider-block">
      <div class="slider-label">QUANTISE: <span class="value" id="quantise-readout">0%</span></div>
      <div class="slider-track" id="slider-track">
        <div class="slider-track-line"></div>
        <div class="slider-track-fill" id="slider-fill"></div>
        <div class="slider-handle" id="slider-handle" style="left: 0%;"></div>
      </div>
    </div>
  </div>

<script>

// ----- CONFIG -----
const BPM = 85;
const BAR_DURATION = (60 / BPM) * 4; // ~2.8235s
const SIXTEENTHS_PER_BAR = 16;

const PATTERN = {
  kick:    [0, 3, 7, 8, 10, 13],
  snare:   [4, 12],
  hat:     [2, 6, 14],
  cowbell: [5, 8, 11]
};
const JITTER = {
  kick:    [+0.15, +0.38, -0.30, +0.10, -0.42, +0.25],
  snare:   [-0.18, +0.33],
  hat:     [+0.40, -0.25, -0.35],
  cowbell: [+0.45, -0.20, -0.40]
};
const LANES = ['kick', 'snare', 'hat', 'cowbell'];

// viewBox: 920 x 240. SVG uses preserveAspectRatio="none" so we set
// gridline x positions directly in viewBox coords. Circles are drawn
// with rx/ry to compensate for non-uniform scaling so they stay round.
const VB_W = 920;
const VB_H = 240;
const LANE_H = VB_H / LANES.length; // 60

// so 1 vb-unit-x renders the same visual length as 1 vb-unit-y.
// preserveAspectRatio="none" on the SVG lets us trust this directly,
// meaning rx === ry produces a visually round circle.

function b64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}
async function loadSamples() {
  for (const lane of LANES) {
    buffers[lane] = await audioCtx.decodeAudioData(b64ToBuf(SAMPLES_B64[lane]));
  }
}
function playSample(lane, when) {
  if (!buffers[lane]) return;
  const src = audioCtx.createBufferSource();
  src.buffer = buffers[lane];
  src.connect(audioCtx.destination);
  src.start(when);
}

// ----- SVG -----
const svg = document.getElementById('grid-svg');
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

// Lane separators (subtle horizontal lines between lanes)
for (let i = 1; i < LANES.length; i++) {
  svg.appendChild(el('line', {
    x1: 0, x2: VB_W,
    y1: i * LANE_H, y2: i * LANE_H,
    stroke: 'rgba(234, 224, 208, 0.06)',
    'stroke-width': 1,
    'vector-effect': 'non-scaling-stroke'
  }));
}

// Vertical gridlines: 16ths, 8ths, quarters, bar boundaries
for (let i = 0; i <= SIXTEENTHS_PER_BAR; i++) {
  let stroke;
  if (i === 0 || i === SIXTEENTHS_PER_BAR) stroke = 'rgba(234, 224, 208, 0.45)';
  else if (i % 4 === 0) stroke = 'rgba(234, 224, 208, 0.28)';
  else if (i % 2 === 0) stroke = 'rgba(234, 224, 208, 0.14)';
  else stroke = 'rgba(234, 224, 208, 0.08)';
  const x = (i / SIXTEENTHS_PER_BAR) * VB_W;
  svg.appendChild(el('line', {
    x1: x, x2: x, y1: 0, y2: VB_H,
    stroke: stroke,
    'stroke-width': 1,
    'vector-effect': 'non-scaling-stroke'
  }));
}

// Circles for hits — one ellipse per hit (rx/ry visually round)
const circles = {};
for (const lane of LANES) {
  circles[lane] = [];
  const laneIdx = LANES.indexOf(lane);
  const cy = laneIdx * LANE_H + LANE_H / 2;
  for (let i = 0; i < PATTERN[lane].length; i++) {
    const pos = PATTERN[lane][i] + JITTER[lane][i];
    const cx = (pos / SIXTEENTHS_PER_BAR) * VB_W;
    const c = el('ellipse', {
      cx: cx, cy: cy,
      rx: CIRCLE_R, ry: CIRCLE_R,
      fill: '#C07838'
    });
    svg.appendChild(c);
    circles[lane].push(c);
  }
}

// Playhead — drawn last so it's on top
const playhead = el('line', {
  x1: 0, x2: 0, y1: 0, y2: VB_H,
  stroke: '#D8904A',
  'stroke-width': 1.5,
  'vector-effect': 'non-scaling-stroke',
  opacity: 0
});
svg.appendChild(playhead);

// ----- STATE -----
let quantiseStrength = 0; // 0..1
let isPlaying = false;
let playStartTime = 0;
let currentLoopIndex = -1;
const triggered = {};
let samplesReady = false;

function resetTriggered() {
  for (const lane of LANES) triggered[lane] = PATTERN[lane].map(() => false);
}
resetTriggered();

function getHitPosition(lane, i) {
  return PATTERN[lane][i] + JITTER[lane][i] * (1 - quantiseStrength);
}

function updateCirclePositions() {
  for (const lane of LANES) {
    for (let i = 0; i < PATTERN[lane].length; i++) {
      const pos = getHitPosition(lane, i);
      circles[lane][i].setAttribute('cx', (pos / SIXTEENTHS_PER_BAR) * VB_W);
    }
  }
}
updateCirclePositions();

function flashCircle(lane, i) {
  const c = circles[lane][i];
  c.setAttribute('fill', '#D8904A');
  c.setAttribute('rx', CIRCLE_R * 1.35);
  c.setAttribute('ry', CIRCLE_R * 1.35);
  setTimeout(() => {
    c.setAttribute('fill', '#C07838');
    c.setAttribute('rx', CIRCLE_R);
    c.setAttribute('ry', CIRCLE_R);
  }, 90);
}

// ----- SCHEDULER -----
const LOOKAHEAD = 0.05;

function schedulerTick() {
  if (!isPlaying || !samplesReady) return;
  const now = audioCtx.currentTime;
  const elapsed = now - playStartTime;
  if (elapsed < 0) return; // playback hasn't started yet (head-start offset)
  const loopIndex = Math.floor(elapsed / BAR_DURATION);
  const loopPos = elapsed - loopIndex * BAR_DURATION;
  const loopStartAbs = playStartTime + loopIndex * BAR_DURATION;

  if (loopIndex !== currentLoopIndex) {
    resetTriggered();
    currentLoopIndex = loopIndex;
    // Catch-up: rAF can run a few ms past the loop boundary, so a hit at
    // exactly position 0 (kick[0] at 100% quantise) would fall behind the
    // scheduler's trailing window and never fire. Fire any hits whose
    // intended time has already passed since the loop started. Capped at
    // 100ms to avoid dumping stale hits after a tab pause / long stall.
    if (loopPos > 0 && loopPos < 0.100) {
      for (const lane of LANES) {
        const pat = PATTERN[lane];
        for (let i = 0; i < pat.length; i++) {
          const pos16 = getHitPosition(lane, i);
          const hitTimeInLoop = (pos16 / SIXTEENTHS_PER_BAR) * BAR_DURATION;
          if (hitTimeInLoop >= 0 && hitTimeInLoop < loopPos) {
            playSample(lane, now);
            triggered[lane][i] = true;
            flashCircle(lane, i);
          }
        }
      }
    }
  }

  for (const lane of LANES) {
    const pat = PATTERN[lane];
    for (let i = 0; i < pat.length; i++) {
      if (triggered[lane][i]) continue;
      const pos16 = getHitPosition(lane, i);
      const hitTimeInLoop = (pos16 / SIXTEENTHS_PER_BAR) * BAR_DURATION;
      if (hitTimeInLoop >= loopPos - 0.005 && hitTimeInLoop <= loopPos + LOOKAHEAD) {
        const whenAbs = Math.max(now, loopStartAbs + hitTimeInLoop);
        playSample(lane, whenAbs);
        triggered[lane][i] = true;
        const delayMs = Math.max(0, (whenAbs - now) * 1000);
        setTimeout(() => flashCircle(lane, i), delayMs);
      }
    }
  }
}

// ----- ANIMATION -----
function animate() {
  if (isPlaying) {
    const now = audioCtx.currentTime;
    const elapsed = now - playStartTime;
    const loopPos = elapsed - Math.floor(elapsed / BAR_DURATION) * BAR_DURATION;
    const x = (loopPos / BAR_DURATION) * VB_W;
    playhead.setAttribute('x1', x);
    playhead.setAttribute('x2', x);
    playhead.setAttribute('opacity', 1);
    schedulerTick();
  } else {
    playhead.setAttribute('opacity', 0);
  }
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ----- SLIDER -----
const sliderTrack = document.getElementById('slider-track');
const sliderHandle = document.getElementById('slider-handle');
const sliderFill = document.getElementById('slider-fill');
const readout = document.getElementById('quantise-readout');

function setQuantise(v) {
  quantiseStrength = Math.max(0, Math.min(1, v));
  const pct = Math.round(quantiseStrength * 100);
  readout.textContent = pct + '%';
  sliderHandle.style.left = (quantiseStrength * 100) + '%';
  sliderFill.style.width = (quantiseStrength * 100) + '%';
  updateCirclePositions();
}
setQuantise(0);

let dragging = false;
function fromPointer(clientX) {
  const r = sliderTrack.getBoundingClientRect();
  setQuantise((clientX - r.left) / r.width);
}
sliderTrack.addEventListener('pointerdown', e => {
  dragging = true;
  sliderTrack.classList.add('dragging');
  try { sliderTrack.setPointerCapture(e.pointerId); } catch (_) {}
  fromPointer(e.clientX);
  e.preventDefault();
});
sliderTrack.addEventListener('pointermove', e => { if (dragging) fromPointer(e.clientX); });
sliderTrack.addEventListener('pointerup', e => {
  dragging = false;
  sliderTrack.classList.remove('dragging');
  try { sliderTrack.releasePointerCapture(e.pointerId); } catch (_) {}
});
sliderTrack.addEventListener('pointercancel', () => {
  dragging = false;
  sliderTrack.classList.remove('dragging');
});

// ----- PLAY/STOP -----
const playBtn = document.getElementById('play-btn');
async function startPlayback() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  if (!samplesReady) {
    playBtn.textContent = 'LOADING…';
    playBtn.disabled = true;
    try {
      await loadSamples();
      samplesReady = true;
    } catch (err) {
      console.error('Sample load failed', err);
      playBtn.textContent = 'ERROR';
      return;
    }
    playBtn.disabled = false;
  }
  playStartTime = audioCtx.currentTime + 0.05;
  currentLoopIndex = -1;
  resetTriggered();
  isPlaying = true;
  playBtn.classList.add('playing');
  playBtn.textContent = '■ STOP';
}
function stopPlayback() {
  isPlaying = false;
  playBtn.classList.remove('playing');
  playBtn.textContent = '▶ PLAY';
}
playBtn.addEventListener('click', () => { isPlaying ? stopPlayback() : startPlayback(); });

// ----- AUTO-RESIZE -----
// Report content height to parent so the embed iframe can match it.
// The parent must opt in by listening for messages of type "mote-resize"
// (no-op without a listener). Height is measured from actual rendered
// content, not body min-height.
function reportHeight() {
  if (window.parent === window) return;
  let bottom = 0;
  document.querySelectorAll('body > *').forEach(el => {
    const r = el.getBoundingClientRect();
    if (r.bottom > bottom) bottom = r.bottom;
  });
  // Include body's bottom padding (28px from CSS)
  const height = Math.ceil(bottom + 28);
  try {
    window.parent.postMessage({ type: 'mote-resize', mote: 'quantise', height: height }, '*');
  } catch (_) { /* sandboxed; fall back to fixed iframe height */ }
}

window.addEventListener('load', reportHeight);
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(reportHeight, 100);
});

</script>
